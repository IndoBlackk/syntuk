<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNT // VISUAL_ARCHIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --void: #020202;
            --ash: #ececec;
            --pure-light: #ffffff;
            --ghost: rgba(255, 255, 255, 0.08);
            
            --mono-font: 'Space Mono', monospace;
            --serif-font: 'Cormorant Garamond', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; user-select: none; }

        body {
            background-color: var(--void); color: var(--ash);
            font-family: var(--mono-font); overflow: hidden;
            height: 100vh; width: 100vw; position: relative;
        }

        /* --- HARSH B&W NOISE ENGINE --- */
        #lo-fi-grain {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; opacity: 0.15; mix-blend-mode: overlay;
        }

        /* --- CROSSHAIR CURSOR --- */
        #crosshair-cursor {
            position: fixed; top: 0; left: 0; width: 40px; height: 40px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            border-radius: 50%; border: 1px solid transparent;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), height 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
        }
        #crosshair-cursor::before, #crosshair-cursor::after {
            content: ''; position: absolute; background-color: rgba(255,255,255,0.5); transition: all 0.2s ease;
        }
        #crosshair-cursor::before { width: 100%; height: 1px; }
        #crosshair-cursor::after { height: 100%; width: 1px; }
        .hovering #crosshair-cursor { width: 60px; height: 60px; }
        .hovering #crosshair-cursor::before, .hovering #crosshair-cursor::after { background-color: var(--pure-light); }
        .grabbing #crosshair-cursor { transform: translate(-50%, -50%) rotate(45deg); width: 30px; height: 30px;}

        /* --- MINIMALIST HEADER NAV --- */
        .top-nav {
            position: absolute; top: 40px; left: 40px; right: 40px; z-index: 100;
            display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none;
        }

        .nav-btn {
            font-size: 0.6rem; font-weight: 700; letter-spacing: 4px; color: rgba(255,255,255,0.5);
            text-decoration: none; text-transform: uppercase; transition: color 0.3s, letter-spacing 0.3s;
            pointer-events: auto; padding: 10px 0; display: block;
        }
        .nav-btn:hover { color: var(--pure-light); letter-spacing: 6px; }

        .header-titles { text-align: right; pointer-events: auto;}
        .brand-name { font-family: var(--serif-font); font-style: italic; font-size: 2.5rem; font-weight: 400; line-height: 0.8; color: var(--pure-light); }
        .title-subtext { font-size: 0.55rem; color: rgba(255, 255, 255, 0.3); margin-top: 10px; letter-spacing: 3px; text-transform: uppercase; }

        /* --- SEASONS MENU --- */
        #seasons-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 40px;
            z-index: 50; transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .season-link {
            font-family: var(--serif-font); font-style: italic; font-size: 6rem; color: rgba(255,255,255,0.2);
            text-decoration: none; line-height: 0.8; transition: all 0.4s ease; pointer-events: auto;
            text-transform: lowercase; letter-spacing: -2px; position: relative;
        }
        .season-link::after {
            content: 'VIEW ARCHIVE'; position: absolute; left: 50%; top: 110%; transform: translateX(-50%);
            font-family: var(--mono-font); font-size: 0.55rem; font-style: normal; font-weight: 700; letter-spacing: 6px;
            color: var(--pure-light); opacity: 0; transition: opacity 0.3s, top 0.3s; white-space: nowrap;
        }
        .season-link:hover { color: var(--pure-light); text-shadow: 0 0 30px rgba(255,255,255,0.3); }
        .season-link:hover::after { opacity: 1; top: 100%; }

        /* --- INTERACTIVE CANVAS & 3D PHYSICS --- */
        #archive-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: auto; z-index: 10; opacity: 0; pointer-events: none;
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1);
            perspective: 1500px; /* Essential for the 3D corner lift effect */
            perspective-origin: center;
        }

        .draggable-artifact {
            position: absolute; top: 0; left: 0; /* Position reset, JS handles actual placement via transform */
            max-width: 350px; max-height: 450px; object-fit: contain;
            filter: grayscale(15%) drop-shadow(0 10px 20px rgba(0,0,0,0.8));
            opacity: 0; pointer-events: none;
            transform-style: preserve-3d;
            will-change: transform; /* Pushes element to the GPU for buttery smoothness */
            transition: opacity 0.8s ease, filter 0.4s ease;
            transform-origin: center center;
        }

        .draggable-artifact.visible { opacity: 1; pointer-events: auto; }
        .draggable-artifact.active-drag { filter: grayscale(0%) drop-shadow(0 30px 60px rgba(0,0,0,0.9)); }

        #back-to-seasons { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        #back-to-seasons.visible { opacity: 1; pointer-events: auto; margin-top: 15px; }

    </style>
</head>
<body>

    <!-- Audio Engine -->
    <audio id="spring-audio" src="spring26.mp3" loop></audio>

    <canvas id="lo-fi-grain"></canvas>
    <div id="crosshair-cursor"></div>

    <nav class="top-nav">
        <div>
            <a href="index.html" class="nav-btn interactive">[ ← RETURN TO CORE ]</a>
            <div id="back-to-seasons" class="nav-btn interactive" onclick="returnToMenu()">[ ← BACK TO SEASONS ]</div>
        </div>
        <div class="header-titles">
            <h1 class="brand-name">archive.</h1>
            <p class="title-subtext">Visual Memory Bank</p>
        </div>
    </nav>

    <!-- THE MENU STATE -->
    <div id="seasons-menu">
        <a href="#" class="season-link interactive" onclick="loadCollection('spring')">spring '26</a>
        <a href="#" class="season-link interactive" onclick="loadCollection('autumn')">autumn '26</a>
    </div>

    <!-- THE TACTILE CANVAS STATE -->
    <div id="archive-canvas">
        <!-- ALL 21 IMAGES MAPPED TO SPRING -->
        <img src="archiveimages/1.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/2.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/3.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/4.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/5.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/6.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/7.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/8.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/9.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/10.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/11.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/12.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/13.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/14.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/15.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/16.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/17.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/18.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/19.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/20.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
        <img src="archiveimages/21.png" class="draggable-artifact interactive" data-season="spring" alt="Spring Artifact">
    </div>

    <script>
        // --- NOISE ENGINE ---
        const canvas = document.getElementById('lo-fi-grain');
        const ctx = canvas.getContext('2d', { alpha: false });
        let noiseCacheCanvas = null;
        
        function initNoiseEngine() {
            if(!canvas) return;
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const idata = ctx.createImageData(canvas.width, canvas.height);
            const buffer32 = new Uint32Array(idata.data.buffer);
            for (let i = 0; i < buffer32.length; i++) buffer32[i] = Math.random() < 0.12 ? 0xff000000 : 0xffffffff; 
            noiseCacheCanvas = document.createElement('canvas');
            noiseCacheCanvas.width = canvas.width; noiseCacheCanvas.height = canvas.height;
            noiseCacheCanvas.getContext('2d').putImageData(idata, 0, 0);
        }

        function drawBlitNoise() {
            if (!noiseCacheCanvas) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(noiseCacheCanvas, Math.floor((Math.random() * 30) - 15), Math.floor((Math.random() * 30) - 15));
        }
        window.addEventListener('resize', initNoiseEngine); initNoiseEngine(); setInterval(drawBlitNoise, 40);

        // --- GLOBAL CURSOR TRACKING ---
        const crosshairCursor = document.getElementById('crosshair-cursor');
        let curX = window.innerWidth / 2, curY = window.innerHeight / 2;
        let tarX = curX, tarY = curY;

        document.addEventListener('mousemove', (e) => { tarX = e.clientX; tarY = e.clientY; });

        document.querySelectorAll('.interactive').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
        });

        // --- SPA NAVIGATION & AUDIO LOGIC ---
        const menu = document.getElementById('seasons-menu');
        const archiveCanvas = document.getElementById('archive-canvas');
        const backBtn = document.getElementById('back-to-seasons');
        const springAudio = document.getElementById('spring-audio');
        let currentAudio = null;
        let isScattered = false;

        function fadeOutAudio(audioElement) {
            if (!audioElement) return;
            let vol = audioElement.volume;
            const fade = setInterval(() => {
                if (vol > 0.05) { vol -= 0.05; audioElement.volume = vol; } 
                else { clearInterval(fade); audioElement.pause(); audioElement.volume = 1; }
            }, 50);
        }

        function loadCollection(season) {
            menu.style.opacity = '0';
            menu.style.pointerEvents = 'none';
            archiveCanvas.style.opacity = '1';
            archiveCanvas.style.pointerEvents = 'auto';
            backBtn.classList.add('visible');

            if (season === 'spring') {
                springAudio.volume = 0;
                springAudio.play().catch(e => console.log("Audio requires interaction first"));
                currentAudio = springAudio;
                
                let vol = 0;
                const fade = setInterval(() => {
                    if (vol < 0.95) { vol += 0.05; springAudio.volume = vol; } else { clearInterval(fade); }
                }, 100);
            }

            // Scatter artifacts if not already done
            if(!isScattered) {
                let highestZ = 100;
                physicsObjects.forEach((obj, index) => {
                    if (obj.el.getAttribute('data-season') === season) {
                        obj.el.classList.add('visible');
                        
                        // Set random physical target destinations
                        obj.tx = 100 + (Math.random() * (window.innerWidth - 450));
                        obj.ty = 150 + (Math.random() * (window.innerHeight - 500));
                        obj.r = (Math.random() * 24) - 12; // Base rotation
                        
                        // Instantly teleport to start, they will smoothly Lerp in the physics loop
                        obj.x = obj.tx; obj.y = obj.ty;
                        
                        obj.el.style.zIndex = highestZ + index;
                        highestZ++;
                    }
                });
                isScattered = true;
            } else {
                physicsObjects.forEach(obj => {
                    if (obj.el.getAttribute('data-season') === season) obj.el.classList.add('visible');
                });
            }
        }

        function returnToMenu() {
            archiveCanvas.style.opacity = '0';
            archiveCanvas.style.pointerEvents = 'none';
            menu.style.opacity = '1';
            menu.style.pointerEvents = 'auto';
            backBtn.classList.remove('visible');

            if (currentAudio) { fadeOutAudio(currentAudio); currentAudio = null; }
            physicsObjects.forEach(obj => obj.el.classList.remove('visible'));
        }

        // --- ADVANCED 3D LERP PHYSICS ENGINE ---
        // This replaces CSS transitions with buttery smooth, frame-by-frame mathematics.
        const artifacts = document.querySelectorAll('.draggable-artifact');
        let physicsObjects = [];
        let activeObj = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        // Initialize state for each image
        artifacts.forEach(el => {
            physicsObjects.push({
                el: el,
                x: 0, y: 0,           // Current Position
                tx: 0, ty: 0,         // Target Position
                prevX: 0, prevY: 0,   // For velocity calculation
                r: 0,                 // Base 2D Rotation
                tiltX: 0, tiltY: 0,   // Current 3D Tilt
                tTiltX: 0, tTiltY: 0, // Target 3D Tilt
                scale: 1, tScale: 1   // Scale
            });
        });

        // Mouse Down (Grab)
        physicsObjects.forEach(obj => {
            obj.el.addEventListener('mousedown', (e) => {
                if (!obj.el.classList.contains('visible')) return;
                
                activeObj = obj;
                
                // Bring to front
                let maxZ = 0;
                physicsObjects.forEach(o => {
                    let z = parseInt(window.getComputedStyle(o.el).zIndex) || 0;
                    if (z > maxZ) maxZ = z;
                });
                obj.el.style.zIndex = maxZ + 1;
                
                obj.el.classList.add('active-drag');
                document.body.classList.add('grabbing');
                
                // Lift effect
                obj.tScale = 1.08;

                const rect = obj.el.getBoundingClientRect();
                dragOffsetX = e.clientX - rect.left;
                dragOffsetY = e.clientY - rect.top;
                
                e.preventDefault(); 
            });
        });

        // Mouse Move (Drag)
        window.addEventListener('mousemove', (e) => {
            if (!activeObj) return;
            activeObj.tx = e.clientX - dragOffsetX;
            activeObj.ty = e.clientY - dragOffsetY;
        });

        // Mouse Up (Release)
        window.addEventListener('mouseup', () => {
            if (!activeObj) return;
            activeObj.tScale = 1;
            activeObj.el.classList.remove('active-drag');
            document.body.classList.remove('grabbing');
            activeObj = null;
        });

        // The master rendering loop (Runs ~60fps)
        function renderPhysics() {
            // Update Cursor globally
            curX += (tarX - curX) * 0.25; curY += (tarY - curY) * 0.25;
            if(crosshairCursor) { crosshairCursor.style.left = curX + 'px'; crosshairCursor.style.top = curY + 'px'; }

            physicsObjects.forEach(obj => {
                if(!obj.el.classList.contains('visible')) return;

                // 1. Position Lerp (Smooth trailing)
                obj.x += (obj.tx - obj.x) * 0.15;
                obj.y += (obj.ty - obj.y) * 0.15;
                
                // 2. Scale Lerp
                obj.scale += (obj.tScale - obj.scale) * 0.2;

                // 3. Velocity & Tilt Math (The "Paper Lift" effect)
                if (obj === activeObj) {
                    let velX = obj.x - obj.prevX;
                    let velY = obj.y - obj.prevY;
                    
                    // Map velocity to 3D rotation. Fast drag = more tilt.
                    obj.tTiltX = -(velY * 0.6); // Dragging down tilts top edge back
                    obj.tTiltY = (velX * 0.6);  // Dragging right tilts right edge back
                    
                    // Clamp the maximum bend so it doesn't flip over
                    obj.tTiltX = Math.max(-25, Math.min(25, obj.tTiltX));
                    obj.tTiltY = Math.max(-25, Math.min(25, obj.tTiltY));
                } else {
                    // Smoothly settle back to flat when dropped
                    obj.tTiltX = 0;
                    obj.tTiltY = 0;
                }

                obj.tiltX += (obj.tTiltX - obj.tiltX) * 0.1;
                obj.tiltY += (obj.tTiltY - obj.tiltY) * 0.1;

                // Save previous positions for next frame's velocity check
                obj.prevX = obj.x;
                obj.prevY = obj.y;

                // 4. Apply the hardware-accelerated matrix string
                obj.el.style.transform = `
                    translate3d(${obj.x}px, ${obj.y}px, 0)
                    scale(${obj.scale})
                    rotate(${obj.r}deg)
                    rotateX(${obj.tiltX}deg)
                    rotateY(${obj.tiltY}deg)
                `;
            });

            requestAnimationFrame(renderPhysics);
        }
        
        // Kick off the physics engine
        renderPhysics();

    </script>
</body>
</html>
