<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>archive.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --void: #020202;
            --ash: #ececec;
            --pure-light: #ffffff;
            --ghost: rgba(255, 255, 255, 0.08);
            
            --mono-font: 'Space Mono', monospace;
            --serif-font: 'Cormorant Garamond', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; user-select: none; }

        body {
            background-color: var(--void); color: var(--ash);
            font-family: var(--mono-font); overflow: hidden;
            height: 100vh; width: 100vw; position: relative;
        }

        /* --- HARSH B&W NOISE ENGINE --- */
        #lo-fi-grain {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; opacity: 0.15; mix-blend-mode: overlay;
        }

        /* --- CROSSHAIR CURSOR --- */
        #crosshair-cursor {
            position: fixed; top: 0; left: 0; width: 40px; height: 40px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            border-radius: 50%; border: 1px solid transparent;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), height 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
        }
        #crosshair-cursor::before, #crosshair-cursor::after {
            content: ''; position: absolute; background-color: rgba(255,255,255,0.5); transition: all 0.2s ease;
        }
        #crosshair-cursor::before { width: 100%; height: 1px; }
        #crosshair-cursor::after { height: 100%; width: 1px; }
        .hovering #crosshair-cursor { width: 60px; height: 60px; }
        .hovering #crosshair-cursor::before, .hovering #crosshair-cursor::after { background-color: var(--pure-light); }
        .grabbing #crosshair-cursor { transform: translate(-50%, -50%) rotate(45deg); width: 30px; height: 30px; border-color: rgba(255,255,255,0.2);}

        /* --- MINIMALIST HEADER NAV --- */
        .top-nav {
            position: absolute; top: 40px; left: 40px; right: 40px; z-index: 100;
            display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none;
        }

        .nav-btn {
            font-size: 0.6rem; font-weight: 700; letter-spacing: 4px; color: rgba(255,255,255,0.5);
            text-decoration: none; text-transform: uppercase; transition: color 0.3s, letter-spacing 0.3s;
            pointer-events: auto; padding: 10px 0; display: block;
        }
        .nav-btn:hover { color: var(--pure-light); letter-spacing: 6px; }

        .header-titles { text-align: right; pointer-events: auto;}
        .brand-name { font-family: var(--serif-font); font-style: italic; font-size: 2.5rem; font-weight: 400; line-height: 0.8; color: var(--pure-light); }
        .title-subtext { font-size: 0.55rem; color: rgba(255, 255, 255, 0.3); margin-top: 10px; letter-spacing: 3px; text-transform: uppercase; }

        /* --- SEASONS MENU --- */
        #seasons-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 40px;
            z-index: 50; transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .season-link {
            font-family: var(--serif-font); font-style: italic; font-size: 6rem; color: rgba(255,255,255,0.2);
            text-decoration: none; line-height: 0.8; transition: all 0.4s ease; pointer-events: auto;
            text-transform: lowercase; letter-spacing: -2px; position: relative;
        }
        .season-link::after {
            content: 'VIEW'; position: absolute; left: 50%; top: 110%; transform: translateX(-50%);
            font-family: var(--mono-font); font-size: 0.55rem; font-style: normal; font-weight: 700; letter-spacing: 6px;
            color: var(--pure-light); opacity: 0; transition: opacity 0.3s, top 0.3s; white-space: nowrap;
        }
        .season-link:hover { color: var(--pure-light); text-shadow: 0 0 30px rgba(255,255,255,0.3); }
        .season-link:hover::after { opacity: 1; top: 100%; }

        /* --- AUTUMN '26: MINIMALIST STATE --- */
        #autumn-coming-soon {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 40; opacity: 0; pointer-events: none; transition: opacity 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #coming-soon-text {
            font-family: var(--serif-font); font-style: italic; font-size: 2.5rem; 
            color: rgba(255,255,255,0.4); letter-spacing: 2px;
        }

        /* --- INTERACTIVE CANVAS & 3D PHYSICS (SPRING) --- */
        #archive-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: auto; z-index: 10; opacity: 0; pointer-events: none;
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1);
            perspective: 1500px; 
            perspective-origin: center;
        }

        .draggable-artifact {
            position: absolute; top: 0; left: 0; 
            max-width: 320px; max-height: 420px; object-fit: contain;
            filter: grayscale(15%) drop-shadow(0 8px 15px rgba(0,0,0,0.6));
            opacity: 0; pointer-events: none;
            transform-style: preserve-3d;
            will-change: transform, filter; 
            transition: opacity 0.8s ease, filter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: center center;
        }

        .draggable-artifact.visible { opacity: 1; pointer-events: auto; }
        
        .draggable-artifact.active-drag { 
            filter: grayscale(0%) drop-shadow(0 40px 60px rgba(0,0,0,0.9)); 
        }

        #back-to-seasons { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        #back-to-seasons.visible { opacity: 1; pointer-events: auto; margin-top: 15px; }

    </style>
</head>
<body>

    <audio id="spring-audio" src="spring26.mp3" loop></audio>

    <canvas id="lo-fi-grain"></canvas>
    <div id="crosshair-cursor"></div>

    <nav class="top-nav">
        <div>
            <a href="index.html" class="nav-btn interactive">[ ← RETURN ]</a>
            <div id="back-to-seasons" class="nav-btn interactive" onclick="returnToMenu()">[ ← COLLECTIONS ]</div>
        </div>
        <div class="header-titles">
            <h1 class="brand-name">archive.</h1>
            <p class="title-subtext">Seasonal Visual Collections</p>
        </div>
    </nav>

    <!-- THE MENU STATE -->
    <div id="seasons-menu">
        <a href="#" class="season-link interactive" onclick="loadCollection('spring')">spring '26</a>
        <a href="#" class="season-link interactive" onclick="loadAutumn()">autumn '26</a>
    </div>

    <!-- THE AUTUMN MINIMALIST STATE -->
    <div id="autumn-coming-soon">
        <div id="coming-soon-text">coming soon...</div>
    </div>

    <!-- THE SPRING TACTILE CANVAS STATE -->
    <div id="archive-canvas">
        <img src="archiveimages/1.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/2.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/3.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/4.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/5.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/6.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/7.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/8.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/9.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/10.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/11.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/12.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/13.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/14.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/15.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/16.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/17.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/18.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/19.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/20.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
        <img src="archiveimages/21.png" class="draggable-artifact interactive" data-season="spring" alt="Artifact">
    </div>

    <script>
        // --- NOISE ENGINE ---
        const canvas = document.getElementById('lo-fi-grain');
        const ctx = canvas.getContext('2d', { alpha: false });
        let noiseCacheCanvas = null;
        
        function initNoiseEngine() {
            if(!canvas) return;
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const idata = ctx.createImageData(canvas.width, canvas.height);
            const buffer32 = new Uint32Array(idata.data.buffer);
            for (let i = 0; i < buffer32.length; i++) buffer32[i] = Math.random() < 0.12 ? 0xff000000 : 0xffffffff; 
            noiseCacheCanvas = document.createElement('canvas');
            noiseCacheCanvas.width = canvas.width; noiseCacheCanvas.height = canvas.height;
            noiseCacheCanvas.getContext('2d').putImageData(idata, 0, 0);
        }

        function drawBlitNoise() {
            if (!noiseCacheCanvas) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(noiseCacheCanvas, Math.floor((Math.random() * 30) - 15), Math.floor((Math.random() * 30) - 15));
        }
        window.addEventListener('resize', initNoiseEngine); initNoiseEngine(); setInterval(drawBlitNoise, 40);

        // --- GLOBAL CURSOR TRACKING ---
        const crosshairCursor = document.getElementById('crosshair-cursor');
        let curX = window.innerWidth / 2, curY = window.innerHeight / 2;
        let tarX = curX, tarY = curY;

        document.addEventListener('mousemove', (e) => { tarX = e.clientX; tarY = e.clientY; });

        document.querySelectorAll('.interactive').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
        });

        // --- MASTER AUDIO ENGINE (Web Audio API) ---
        let audioCtx;
        let droneGain, droneOsc1, droneOsc2;
        let isAudioInit = false;

        function initGenerativeAudio() {
            if (isAudioInit) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Construct the deep menu drone (Sub-bass beating effect)
                droneOsc1 = audioCtx.createOscillator();
                droneOsc2 = audioCtx.createOscillator();
                droneGain = audioCtx.createGain();

                droneOsc1.type = 'triangle';
                droneOsc1.frequency.value = 55.0; // A1
                
                droneOsc2.type = 'sine';
                droneOsc2.frequency.value = 54.5; // Slight detune creates rhythmic beating

                droneGain.gain.value = 0; // Start silent

                droneOsc1.connect(droneGain);
                droneOsc2.connect(droneGain);
                droneGain.connect(audioCtx.destination);

                droneOsc1.start();
                droneOsc2.start();

                // Fade in the drone smoothly
                droneGain.gain.setTargetAtTime(0.12, audioCtx.currentTime, 2.0);
                
                isAudioInit = true;
            } catch (e) { console.error("Audio Context failed to initialize"); }
        }

        // Initialize audio secretly on the very first interaction
        document.body.addEventListener('mousemove', initGenerativeAudio, { once: true });
        document.body.addEventListener('click', initGenerativeAudio, { once: true });

        // --- CINEMATIC SUB BOOM ---
        function playSoftSubBoom() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            
            // Frequency drops from 60Hz to 20Hz creating a heavy "thud"
            osc.frequency.setValueAtTime(60, t);
            osc.frequency.exponentialRampToValueAtTime(20, t + 1.5);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.5, t + 0.1); // Soft attack
            gain.gain.exponentialRampToValueAtTime(0.001, t + 3.0); // Long, echoing release
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(t);
            osc.stop(t + 3.1);
        }

        // --- SPA NAVIGATION LOGIC ---
        const menu = document.getElementById('seasons-menu');
        const archiveCanvas = document.getElementById('archive-canvas');
        const autumnContainer = document.getElementById('autumn-coming-soon');
        const backBtn = document.getElementById('back-to-seasons');
        const springAudio = document.getElementById('spring-audio');
        let currentAudio = null;
        let isScattered = false;
        let globalZIndex = 100;

        function fadeOutAudio(audioElement) {
            if (!audioElement) return;
            let vol = audioElement.volume;
            const fade = setInterval(() => {
                if (vol > 0.05) { vol -= 0.05; audioElement.volume = vol; } 
                else { clearInterval(fade); audioElement.pause(); audioElement.volume = 1; }
            }, 50);
        }

        function loadAutumn() {
            // UI State
            menu.style.opacity = '0'; menu.style.pointerEvents = 'none';
            autumnContainer.style.opacity = '1';
            backBtn.classList.add('visible');

            // Audio State: Fade out the drone, trigger the deep cinematic boom
            if (droneGain) droneGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); 
            playSoftSubBoom();
        }

        function loadCollection(season) {
            menu.style.opacity = '0'; menu.style.pointerEvents = 'none';
            archiveCanvas.style.opacity = '1'; archiveCanvas.style.pointerEvents = 'auto';
            backBtn.classList.add('visible');

            // Audio State
            if (droneGain) droneGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); 

            if (season === 'spring') {
                springAudio.volume = 0; springAudio.play().catch(e => console.log("Interaction required"));
                currentAudio = springAudio;
                let vol = 0;
                const fade = setInterval(() => { if (vol < 0.95) { vol += 0.05; springAudio.volume = vol; } else { clearInterval(fade); } }, 100);
            }

            // Scatter artifacts radially
            if(!isScattered) {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const spreadWidth = window.innerWidth * 0.7; 
                const spreadHeight = window.innerHeight * 0.6;

                physicsObjects.forEach((obj, index) => {
                    if (obj.el.getAttribute('data-season') === season) {
                        obj.el.classList.add('visible');
                        
                        obj.tx = centerX + ((Math.random() - 0.5) * spreadWidth) - 160; 
                        obj.ty = centerY + ((Math.random() - 0.5) * spreadHeight) - 210; 
                        obj.tr = (Math.random() * 60) - 30; 
                        
                        obj.x = obj.tx; obj.y = obj.ty; obj.r = obj.tr;
                        globalZIndex++;
                        obj.el.style.zIndex = globalZIndex;
                    }
                });
                isScattered = true;
            } else {
                physicsObjects.forEach(obj => { if (obj.el.getAttribute('data-season') === season) obj.el.classList.add('visible'); });
            }
        }

        function returnToMenu() {
            // UI State Reset
            archiveCanvas.style.opacity = '0'; archiveCanvas.style.pointerEvents = 'none';
            autumnContainer.style.opacity = '0';
            menu.style.opacity = '1'; menu.style.pointerEvents = 'auto';
            backBtn.classList.remove('visible');
            
            // Spring Reset
            if (currentAudio) { fadeOutAudio(currentAudio); currentAudio = null; }
            physicsObjects.forEach(obj => obj.el.classList.remove('visible'));

            // Bring the Drone back
            if (droneGain) droneGain.gain.setTargetAtTime(0.12, audioCtx.currentTime, 1.5);
        }

        // --- THE INERTIAL PHYSICS ENGINE ---
        const artifacts = document.querySelectorAll('.draggable-artifact');
        let physicsObjects = [];
        let activeObj = null;
        let dragOffsetX = 0, dragOffsetY = 0;

        artifacts.forEach(el => {
            physicsObjects.push({
                el: el,
                isDragging: false,
                x: 0, y: 0, tx: 0, ty: 0,
                vx: 0, vy: 0,
                r: 0, tr: 0, vr: 0,
                tiltX: 0, tiltY: 0, tTiltX: 0, tTiltY: 0,
                scale: 1, tScale: 1
            });
        });

        physicsObjects.forEach(obj => {
            obj.el.addEventListener('mousedown', (e) => {
                if (!obj.el.classList.contains('visible') || activeObj) return;
                e.stopPropagation(); 
                
                activeObj = obj;
                obj.isDragging = true;
                
                globalZIndex++;
                obj.el.style.zIndex = globalZIndex;
                
                obj.el.classList.add('active-drag');
                document.body.classList.add('grabbing');
                
                obj.tScale = 1.08; 
                obj.vr = 0; 

                const rect = obj.el.getBoundingClientRect();
                dragOffsetX = e.clientX - rect.left;
                dragOffsetY = e.clientY - rect.top;
                
                e.preventDefault(); 
            });
        });

        window.addEventListener('mousemove', (e) => {
            if (!activeObj) return;
            activeObj.tx = e.clientX - dragOffsetX;
            activeObj.ty = e.clientY - dragOffsetY;
        });

        window.addEventListener('mouseup', () => {
            if (!activeObj) return;
            activeObj.isDragging = false;
            activeObj.tScale = 1;
            activeObj.el.classList.remove('active-drag');
            document.body.classList.remove('grabbing');
            activeObj = null;
        });

        function renderPhysics() {
            curX += (tarX - curX) * 0.25; curY += (tarY - curY) * 0.25;
            if(crosshairCursor) { crosshairCursor.style.left = curX + 'px'; crosshairCursor.style.top = curY + 'px'; }

            physicsObjects.forEach(obj => {
                if(!obj.el.classList.contains('visible')) return;

                if (obj.isDragging) {
                    obj.vx = obj.tx - obj.x;
                    obj.vy = obj.ty - obj.y;
                    
                    obj.x = obj.tx;
                    obj.y = obj.ty;
                    
                    obj.tTiltX = -(obj.vy * 0.4); 
                    obj.tTiltY = (obj.vx * 0.4);  
                    
                    obj.tTiltX = Math.max(-30, Math.min(30, obj.tTiltX));
                    obj.tTiltY = Math.max(-30, Math.min(30, obj.tTiltY));
                    
                } else {
                    obj.vx *= 0.88; 
                    obj.vy *= 0.88;
                    obj.vr *= 0.95; 

                    obj.tx += obj.vx;
                    obj.ty += obj.vy;
                    obj.tr += obj.vr;

                    if (obj.tx < -100) { obj.tx = -100; obj.vx *= -0.5; }
                    if (obj.ty < -100) { obj.ty = -100; obj.vy *= -0.5; }
                    if (obj.tx > window.innerWidth - 200) { obj.tx = window.innerWidth - 200; obj.vx *= -0.5; }
                    if (obj.ty > window.innerHeight - 200) { obj.ty = window.innerHeight - 200; obj.vy *= -0.5; }

                    obj.x += (obj.tx - obj.x) * 0.2;
                    obj.y += (obj.ty - obj.y) * 0.2;
                    obj.r += (obj.tr - obj.r) * 0.2;
                    
                    obj.tTiltX = 0;
                    obj.tTiltY = 0;
                }

                obj.scale += (obj.tScale - obj.scale) * 0.15;
                obj.tiltX += (obj.tTiltX - obj.tiltX) * 0.1;
                obj.tiltY += (obj.tTiltY - obj.tiltY) * 0.1;

                if (!obj.isDragging && (Math.abs(obj.vx) > 10 || Math.abs(obj.vy) > 10)) {
                    obj.vr = (obj.vx + obj.vy) * 0.05; 
                }

                obj.el.style.transform = `
                    translate3d(${obj.x}px, ${obj.y}px, 0)
                    scale(${obj.scale})
                    rotate(${obj.r}deg)
                    rotateX(${obj.tiltX}deg)
                    rotateY(${obj.tiltY}deg)
                `;
            });

            requestAnimationFrame(renderPhysics);
        }
        
        renderPhysics();

    </script>
</body>
</html>
