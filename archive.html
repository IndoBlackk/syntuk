<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNT // VISUAL_ARCHIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --void: #020202;
            --ash: #ececec;
            --pure-light: #ffffff;
            --ghost: rgba(255, 255, 255, 0.08);
            
            --mono-font: 'Space Mono', monospace;
            --serif-font: 'Cormorant Garamond', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; user-select: none; }

        body {
            background-color: var(--void); color: var(--ash);
            font-family: var(--mono-font); overflow: hidden;
            height: 100vh; width: 100vw; position: relative;
        }

        /* --- HARSH B&W NOISE ENGINE --- */
        #lo-fi-grain {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; opacity: 0.15; mix-blend-mode: overlay;
        }

        /* --- CROSSHAIR CURSOR --- */
        #crosshair-cursor {
            position: fixed; top: 0; left: 0; width: 40px; height: 40px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            border-radius: 50%; border: 1px solid transparent;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), height 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
        }
        #crosshair-cursor::before, #crosshair-cursor::after {
            content: ''; position: absolute; background-color: rgba(255,255,255,0.5); transition: all 0.2s ease;
        }
        #crosshair-cursor::before { width: 100%; height: 1px; }
        #crosshair-cursor::after { height: 100%; width: 1px; }
        .hovering #crosshair-cursor { width: 60px; height: 60px; }
        .hovering #crosshair-cursor::before, .hovering #crosshair-cursor::after { background-color: var(--pure-light); }
        .grabbing #crosshair-cursor { transform: translate(-50%, -50%) rotate(45deg); width: 30px; height: 30px;}

        /* --- BRUTALIST ARCHITECTURE GRID --- */
        .brutalist-grid {
            display: grid; grid-template-columns: 80px 1fr 450px;
            height: 100vh; width: 100vw; position: relative; z-index: 10;
        }

        .panel {
            border-right: 1px solid var(--ghost); position: relative;
            height: 100%; display: flex; flex-direction: column; justify-content: space-between;
        }

        .left-axis { padding: 40px 0; align-items: center; border-right: 1px solid rgba(255,255,255,0.08); }
        .vertical-marker { transform: rotate(-90deg); white-space: nowrap; font-size: 0.55rem; color: rgba(255, 255, 255, 0.3); letter-spacing: 6px; text-transform: uppercase;}

        .center-nave { position: relative; padding: 0; overflow: hidden; display: flex; justify-content: center; align-items: center;}
        
        .header-block { position: absolute; top: 60px; left: 80px; z-index: 50; pointer-events: none;}
        .brand-name { font-family: var(--serif-font); font-style: italic; font-size: 4rem; font-weight: 400; line-height: 0.7; color: var(--pure-light); pointer-events: auto;}
        .title-subtext { font-size: 0.6rem; color: rgba(255, 255, 255, 0.4); margin-top: 20px; letter-spacing: 2px; text-transform: uppercase; pointer-events: auto;}

        /* --- INTERACTIVE CANVAS & ARTIFACTS --- */
        .canvas-area {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: auto; z-index: 1;
        }

        .draggable-artifact {
            position: absolute;
            max-width: 350px; 
            max-height: 450px;
            object-fit: contain;
            filter: grayscale(20%) drop-shadow(0 15px 30px rgba(0,0,0,0.8));
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), filter 0.4s ease;
            transform-origin: center center;
        }

        .draggable-artifact.active-drag {
            filter: grayscale(0%) drop-shadow(0 25px 50px rgba(0,0,0,0.9));
        }

        /* --- INDEX ARCHIVE --- */
        .right-cloisters { border-right: none; padding: 60px 50px; justify-content: center; background: linear-gradient(to right, rgba(0,0,0,0), rgba(2,2,2,0.9)); pointer-events: auto; z-index: 50;}
        .section-header { font-size: 0.6rem; color: rgba(255, 255, 255, 0.3); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 50px; }
        .directory-list { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--ghost); }

        .dir-node {
            display: grid; grid-template-columns: 40px 1fr; align-items: center;
            padding: 30px 0; border-bottom: 1px solid var(--ghost);
            text-decoration: none; color: rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative;
        }
        .dir-node::before {
            content: ''; position: absolute; left: -20px; top: 50%; transform: translateY(-50%);
            width: 0px; height: 1px; background-color: var(--pure-light); transition: width 0.4s, left 0.4s;
        }
        .dir-node:hover { color: var(--pure-light); padding-left: 20px; background: linear-gradient(90deg, rgba(255, 255, 255, 0.04) 0%, transparent 100%); }
        .dir-node:hover::before { width: 30px; left: -10px; }
        
        .dir-index { font-family: var(--serif-font); font-style: italic; font-size: 1.2rem; }
        .dir-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; transition: letter-spacing 0.4s; }
        .dir-node:hover .dir-title { letter-spacing: 2px; }
        .dir-spec { font-size: 0.55rem; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }

        @media (max-width: 1024px) {
            .brutalist-grid { grid-template-columns: 1fr; height: auto; }
            .left-axis, #crosshair-cursor, #lo-fi-grain { display: none; }
            .right-cloisters { padding: 40px 20px;}
            .center-nave { height: 80vh; overflow: hidden; }
            body { overflow: auto; cursor: auto; }
        }
    </style>
</head>
<body>

    <canvas id="lo-fi-grain"></canvas>
    <div id="crosshair-cursor"></div>

    <div class="brutalist-grid">
        <div class="panel left-axis">
            <div class="vertical-marker" style="margin-top: auto; color: rgba(255,255,255,0.8);">0X1900</div>
        </div>

        <div class="panel center-nave">
            <div class="header-block">
                <h1 class="brand-name interactive">archive.</h1>
                <p class="title-subtext">Click and drag to arrange artifacts.<br>Physical momentum retained.</p>
            </div>

            <div class="canvas-area" id="archive-canvas">
                <img src="archiveimages/1.png" class="draggable-artifact interactive" alt="Archive 01">
                <img src="archiveimages/2.png" class="draggable-artifact interactive" alt="Archive 02">
                <img src="archiveimages/3.png" class="draggable-artifact interactive" alt="Archive 03">
                <img src="archiveimages/4.png" class="draggable-artifact interactive" alt="Archive 04">
                <img src="archiveimages/5.png" class="draggable-artifact interactive" alt="Archive 05">
                <img src="archiveimages/6.png" class="draggable-artifact interactive" alt="Archive 06">
                <img src="archiveimages/7.png" class="draggable-artifact interactive" alt="Archive 07">
                <img src="archiveimages/8.png" class="draggable-artifact interactive" alt="Archive 08">
                <img src="archiveimages/9.png" class="draggable-artifact interactive" alt="Archive 09">
                <img src="archiveimages/10.png" class="draggable-artifact interactive" alt="Archive 10">
                <img src="archiveimages/11.png" class="draggable-artifact interactive" alt="Archive 11">
                <img src="archiveimages/12.png" class="draggable-artifact interactive" alt="Archive 12">
                <img src="archiveimages/13.png" class="draggable-artifact interactive" alt="Archive 13">
                <img src="archiveimages/14.png" class="draggable-artifact interactive" alt="Archive 14">
                <img src="archiveimages/15.png" class="draggable-artifact interactive" alt="Archive 15">
                <img src="archiveimages/16.png" class="draggable-artifact interactive" alt="Archive 16">
                <img src="archiveimages/17.png" class="draggable-artifact interactive" alt="Archive 17">
                <img src="archiveimages/18.png" class="draggable-artifact interactive" alt="Archive 18">
                <img src="archiveimages/19.png" class="draggable-artifact interactive" alt="Archive 19">
                <img src="archiveimages/20.png" class="draggable-artifact interactive" alt="Archive 20">
                <img src="archiveimages/21.png" class="draggable-artifact interactive" alt="Archive 21">
            </div>
        </div>

        <div class="panel right-cloisters">
            <div class="section-header">// ROOT DIRECTORY</div>
            <nav class="directory-list">
                <a href="index.html" class="dir-node interactive">
                    <div class="dir-index">00</div>
                    <div class="dir-content">
                        <div class="dir-title">TERMINAL</div>
                        <div class="dir-spec">Return to Core</div>
                    </div>
                </a>
                <a href="player.html" class="dir-node interactive">
                    <div class="dir-index">01</div>
                    <div class="dir-content">
                        <div class="dir-title">TRACKS</div>
                        <div class="dir-spec">Master Audio</div>
                    </div>
                </a>
            </nav>
        </div>
    </div>

    <script>
        // --- NOISE ENGINE ---
        const canvas = document.getElementById('lo-fi-grain');
        const ctx = canvas.getContext('2d', { alpha: false });
        let noiseCacheCanvas = null;
        
        function initNoiseEngine() {
            if(!canvas) return;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const idata = ctx.createImageData(canvas.width, canvas.height);
            const buffer32 = new Uint32Array(idata.data.buffer);
            for (let i = 0; i < buffer32.length; i++) buffer32[i] = Math.random() < 0.15 ? 0xff000000 : 0xffffffff; 
            noiseCacheCanvas = document.createElement('canvas');
            noiseCacheCanvas.width = canvas.width;
            noiseCacheCanvas.height = canvas.height;
            noiseCacheCanvas.getContext('2d').putImageData(idata, 0, 0);
        }

        function drawBlitNoise() {
            if (!noiseCacheCanvas) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(noiseCacheCanvas, Math.floor((Math.random() * 30) - 15), Math.floor((Math.random() * 30) - 15));
        }
        window.addEventListener('resize', initNoiseEngine);
        initNoiseEngine();
        setInterval(drawBlitNoise, 40);

        // --- CURSOR TRACKING ---
        const crosshairCursor = document.getElementById('crosshair-cursor');
        let curX = window.innerWidth / 2, curY = window.innerHeight / 2;
        let tarX = curX, tarY = curY;

        document.addEventListener('mousemove', (e) => {
            tarX = e.clientX;
            tarY = e.clientY;
        });

        function renderCursor() {
            curX += (tarX - curX) * 0.25; 
            curY += (tarY - curY) * 0.25;
            if(crosshairCursor) {
                crosshairCursor.style.left = curX + 'px';
                crosshairCursor.style.top = curY + 'px';
            }
            requestAnimationFrame(renderCursor);
        }
        renderCursor();

        document.querySelectorAll('.interactive').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
        });

        // --- TACTILE DRAG & DROP ENGINE ---
        const artifacts = document.querySelectorAll('.draggable-artifact');
        const canvasArea = document.getElementById('archive-canvas');
        
        let highestZ = 100;
        let activeElement = null;
        let offsetX = 0, offsetY = 0;

        artifacts.forEach((artifact, index) => {
            const randomRotation = (Math.random() * 20) - 10; 
            artifact.dataset.rotation = randomRotation;
            
            // Distributes the 21 images dynamically across the container
            const startX = 50 + (Math.random() * (canvasArea.clientWidth - 300));
            const startY = 50 + (Math.random() * (canvasArea.clientHeight - 400));
            
            artifact.style.left = `${startX}px`;
            artifact.style.top = `${startY}px`;
            artifact.style.transform = `rotate(${randomRotation}deg)`;
            artifact.style.zIndex = highestZ + index;
            highestZ++;

            artifact.addEventListener('mousedown', (e) => {
                activeElement = artifact;
                highestZ++;
                
                activeElement.style.zIndex = highestZ;
                activeElement.classList.add('active-drag');
                document.body.classList.add('grabbing');
                
                activeElement.style.transform = `rotate(${activeElement.dataset.rotation}deg) scale(1.05)`;

                const rect = activeElement.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                
                e.preventDefault(); 
            });
        });

        window.addEventListener('mousemove', (e) => {
            if (!activeElement) return;

            const canvasRect = canvasArea.getBoundingClientRect();
            
            let newX = e.clientX - canvasRect.left - offsetX;
            let newY = e.clientY - canvasRect.top - offsetY;

            activeElement.style.left = `${newX}px`;
            activeElement.style.top = `${newY}px`;
        });

        window.addEventListener('mouseup', () => {
            if (!activeElement) return;
            
            activeElement.style.transform = `rotate(${activeElement.dataset.rotation}deg) scale(1)`;
            activeElement.classList.remove('active-drag');
            document.body.classList.remove('grabbing');
            
            activeElement = null;
        });
    </script>
</body>
</html>
