<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNT // RESONANCE PLAYER</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Space+Mono:wght@400;700&display=swap');

        :root {
            --void-black: #000000;
            --stone-dark: #050506;
            --bone-white: #f4f4f5;
            --torch-glow: #ffd185; 
            --tomb-bronze: #3d372e; 
            
            --serif-font: 'Cormorant Garamond', serif;
            --mono-font: 'Space Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; user-select: none; }

        body {
            background-color: var(--void-black);
            color: var(--bone-white);
            font-family: var(--mono-font);
            letter-spacing: -0.5px;
            overflow: hidden;
            height: 100vh; width: 100vw;
            position: relative;
        }

        /* --- BACKGROUND ENVIRONMENT --- */
        #tomb-dust {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            mix-blend-mode: overlay;
            transition: opacity 0.1s ease;
        }

        .infinite-inferno {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
            font-family: var(--serif-font); font-style: italic; font-size: 1.4rem; 
            line-height: 1.4; text-align: justify; color: var(--tomb-bronze); 
            opacity: 1; padding: 40px; overflow: hidden;
            -webkit-mask-image: radial-gradient(circle var(--mask-radius, 120px) at var(--mask-x, 50%) var(--mask-y, 50%), rgba(0,0,0,var(--mask-opacity, 1)) 0%, rgba(0,0,0,0) 100%);
            mask-image: radial-gradient(circle var(--mask-radius, 120px) at var(--mask-x, 50%) var(--mask-y, 50%), rgba(0,0,0,var(--mask-opacity, 1)) 0%, rgba(0,0,0,0) 100%);
        }

        /* --- AUDIO REACTIVE CURSOR --- */
        #tomb-lantern-cursor {
            position: fixed; top: 0; left: 0;
            width: 150px; height: 150px; border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10000;
            display: flex; align-items: center; justify-content: center;
            filter: blur(1px);
        }

        #cursor-text-svg {
            width: 120px; height: 120px;
            animation: spin 16s linear infinite;
            fill: var(--torch-glow); 
            opacity: 0.7; 
            filter: drop-shadow(0 0 4px rgba(0,0,0,0.9));
            transition: fill 0.3s ease;
        }
        .hovering #cursor-text-svg { fill: #fff; }

        /* --- LAYOUT --- */
        .cathedral-layout {
            display: grid;
            grid-template-columns: 120px 1fr 480px;
            height: 100vh; width: 100vw;
            position: relative; z-index: 10;
        }

        .panel {
            border-right: 1px solid rgba(255, 255, 255, 0.03);
            position: relative; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* LEFT AXIS (NAVIGATION) */
        .left-axis { padding: 40px 0; align-items: center; }
        .sigil { font-size: 1.5rem; font-weight: bold; color: var(--bone-white); text-decoration: none; transition: text-shadow 0.3s ease; }
        .sigil:hover { text-shadow: 0 0 15px var(--bone-white); color: #fff;}
        .vertical-marker { transform: rotate(-90deg); white-space: nowrap; font-size: 0.65rem; color: rgba(255, 255, 255, 0.25); letter-spacing: 4px; text-transform: uppercase; }

        /* CENTER NAVE (VISUALIZER) */
        .center-nave { padding: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .monolith-visualizer {
            font-family: var(--serif-font);
            font-size: 10vw;
            color: var(--bone-white);
            font-style: italic;
            opacity: 0.1;
            transition: opacity 0.3s, transform 0.1s;
            will-change: transform;
            text-align: center;
            line-height: 1;
        }

        .track-metadata {
            position: absolute; bottom: 80px; left: 80px;
        }
        .now-playing-label { font-size: 0.6rem; letter-spacing: 4px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 10px; }
        .current-track-title { font-size: 2rem; font-weight: 700; color: var(--bone-white); letter-spacing: 1px; }
        .time-display { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 5px; font-family: var(--mono-font); }

        /* RIGHT CLOISTERS (TRACKLIST) */
        .right-cloisters { border-right: none; padding: 60px 40px; background: linear-gradient(to right, rgba(0,0,0,0), rgba(3,3,4,0.4)); }
        .section-header { font-size: 0.65rem; color: rgba(255, 255, 255, 0.25); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }

        .directory-list { display: flex; flex-direction: column; gap: 16px; }

        .track-node {
            display: grid; grid-template-columns: 50px 1fr 30px;
            align-items: center; padding: 30px 24px;
            background: transparent; border: 1px solid rgba(255,255,255,0.03);
            text-decoration: none; color: rgba(255, 255, 255, 0.4);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
        }

        .track-node::before {
            content: ''; position: absolute;
            top: 0; left: 0; width: 0%; height: 100%;
            background: var(--bone-white);
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: -1;
        }

        .track-node:hover, .track-node.playing { color: var(--void-black); border-color: var(--bone-white); }
        .track-node:hover::before, .track-node.playing::before { width: 100%; }

        .dir-index { font-family: var(--serif-font); font-style: italic; font-size: 1.4rem; color: rgba(255,255,255,0.15); transition: color 0.3s; }
        .track-node:hover .dir-index, .track-node.playing .dir-index { color: rgba(0,0,0,0.4); }

        .dir-title { font-size: 1.1rem; font-weight: 700; letter-spacing: 3px; color: var(--bone-white); transition: color 0.3s; }
        .track-node:hover .dir-title, .track-node.playing .dir-title { color: var(--void-black); }

        .dir-spec { font-size: 0.6rem; margin-top: 6px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255, 255, 255, 0.35); transition: color 0.3s; }
        .track-node:hover .dir-spec, .track-node.playing .dir-spec { color: rgba(0, 0, 0, 0.55); }

        .play-icon { font-size: 1.2rem; opacity: 0; transform: translateX(-10px); transition: all 0.4s; }
        .track-node:hover .play-icon, .track-node.playing .play-icon { opacity: 1; transform: translateX(0); color: var(--void-black); }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <audio id="core-audio-engine"></audio>

    <canvas id="tomb-dust"></canvas>
    <div class="infinite-inferno" id="tomb-wall"></div>

    <div id="tomb-lantern-cursor">
        <svg id="cursor-text-svg" viewBox="0 0 100 100">
            <path id="textPath" d="M 50,50 m -35,0 a 35,35 0 1,1 70,0 a 35,35 0 1,1 -70,0" fill="none"></path>
            <text font-family="var(--serif-font)" font-style="italic" font-size="0.67rem" letter-spacing="2.2px">
                <textPath href="#textPath" startOffset="0%">• SYNT // AUDIO ARCHITECTURE • EMBEDDED GENERATIVE MATRIX •</textPath>
            </text>
        </svg>
    </div>

    <div class="cathedral-layout">
        <div class="panel left-axis">
            <a href="index.html" class="sigil interactive">←</a>
            <div class="vertical-marker">SYSTEM // RESONANCE</div>
        </div>

        <div class="panel center-nave">
            
            <div class="monolith-visualizer" id="monolith">
                R.000
            </div>

            <div class="track-metadata">
                <div class="now-playing-label" id="status-label">SYSTEM IDLE</div>
                <div class="current-track-title" id="display-title">AWAITING INPUT</div>
                <div class="time-display" id="time-display">00:00 // 00:00</div>
            </div>
        </div>

        <div class="panel right-cloisters">
            <div>
                <div class="section-header">// AUDIO ARTIFACTS // SELECT TO EXHUME</div>
                <nav class="directory-list">
                    
                    <div class="track-node interactive" data-src="song1.mp3" data-title="OBSIDIAN SHADOWS">
                        <div class="dir-index">001</div>
                        <div class="dir-content">
                            <div class="dir-title">OBSIDIAN SHADOWS</div>
                            <div class="dir-spec">Master Audio // Lossless .MP3</div>
                        </div>
                        <div class="play-icon">▶</div>
                    </div>
                    
                    <div class="track-node interactive" data-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" data-title="CATACOMB BREEZE">
                        <div class="dir-index">002</div>
                        <div class="dir-content">
                            <div class="dir-title">CATACOMB BREEZE</div>
                            <div class="dir-spec">Generative Stream // Test 02</div>
                        </div>
                        <div class="play-icon">▶</div>
                    </div>

                    <div class="track-node interactive" data-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" data-title="BRONZE CHIME">
                        <div class="dir-index">003</div>
                        <div class="dir-content">
                            <div class="dir-title">BRONZE CHIME</div>
                            <div class="dir-spec">Generative Stream // Test 03</div>
                        </div>
                        <div class="play-icon">▶</div>
                    </div>

                </nav>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CURSOR & TOMB ENVIRONMENT ---
        const cursor = document.getElementById('tomb-lantern-cursor');
        const wall = document.getElementById('tomb-wall');
        const canvas = document.getElementById('tomb-dust');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        let curX = window.innerWidth / 2, curY = window.innerHeight / 2;
        let tarX = curX, tarY = curY;
        let baseRadius = 130;
        let audioRadiusBoost = 0; 

        document.addEventListener('mousemove', (e) => { tarX = e.clientX; tarY = e.clientY; });

        document.querySelectorAll('.interactive').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
        });

        // Generate Background Text Wall
        let textHTML = "";
        for (let i = 0; i < 400; i++) {
            textHTML += "De profundis clamavi ad te Domine • Shadows from our bodies cast against the stone • ";
        }
        wall.innerHTML = textHTML;

        // Noise Engine
        let noiseCache = null;
        function initNoise() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const idata = ctx.createImageData(canvas.width, canvas.height);
            const buf32 = new Uint32Array(idata.data.buffer);
            for (let i = 0; i < buf32.length; i++) buf32[i] = Math.random() < 0.5 ? 0xff000000 : 0xffffffff;
            noiseCache = document.createElement('canvas');
            noiseCache.width = canvas.width; noiseCache.height = canvas.height;
            noiseCache.getContext('2d').putImageData(idata, 0, 0);
        }
        initNoise(); window.addEventListener('resize', initNoise);

        // --- 2. WEB AUDIO API & VISUALIZER ENGINE ---
        const audioEl = document.getElementById('core-audio-engine');
        let audioCtx, analyser, dataArray;
        let isInitialized = false;

        const monolith = document.getElementById('monolith');
        const statusLabel = document.getElementById('status-label');
        const displayTitle = document.getElementById('display-title');
        const timeDisplay = document.getElementById('time-display');

        function initAudio() {
            if (isInitialized) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(audioEl);
            analyser = audioCtx.createAnalyser();
            
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            isInitialized = true;
        }

        // Render Loop
        function renderLoop() {
            curX += (tarX - curX) * 0.08; 
            curY += (tarY - curY) * 0.08;

            let canvasOpacity = 0.04;

            if (isInitialized && !audioEl.paused) {
                analyser.getByteFrequencyData(dataArray);
                
                const bass = (dataArray[0] + dataArray[1] + dataArray[2] + dataArray[3]) / 4;
                const treble = (dataArray[40] + dataArray[50] + dataArray[60]) / 3;

                audioRadiusBoost += ((bass / 255) * 160 - audioRadiusBoost) * 0.2; 
                canvasOpacity = 0.03 + ((treble / 255) * 0.18);

                const scale = 1 + (bass / 255) * 0.25;
                const skewX = ((dataArray[8] / 255) * 30) - 15;
                const skewY = ((dataArray[16] / 255) * 16) - 8;
                
                monolith.style.transform = `scale(${scale}) skew(${skewX}deg, ${skewY}deg)`;
                monolith.style.opacity = 0.15 + (bass / 255) * 0.85;
                monolith.style.textShadow = `${skewX * 0.5}px ${skewY * 0.5}px 0 rgba(255,255,255,0.3)`;
            } else {
                audioRadiusBoost += (0 - audioRadiusBoost) * 0.1; 
                monolith.style.transform = `scale(1) skew(0deg, 0deg)`;
                monolith.style.opacity = 0.08;
                monolith.style.textShadow = 'none';
            }

            if (noiseCache) {
                const jX = Math.floor(Math.random() * 100 - 50);
                const jY = Math.floor(Math.random() * 100 - 50);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(noiseCache, jX, jY);
                canvas.style.opacity = canvasOpacity;
            }

            const targetRadius = document.body.classList.contains('hovering') ? 160 : 130;
            baseRadius += (targetRadius - baseRadius) * 0.1;
            const finalRadius = Math.max(40, baseRadius + audioRadiusBoost + (Math.random() * 4 - 2));

            cursor.style.left = curX + 'px'; cursor.style.top = curY + 'px';
            wall.style.setProperty('--mask-x', curX + 'px');
            wall.style.setProperty('--mask-y', curY + 'px');
            wall.style.setProperty('--mask-radius', finalRadius + 'px');

            requestAnimationFrame(renderLoop);
        }
        renderLoop();

        // --- 3. TRACKLIST MANAGEMENT ---
        const tracks = document.querySelectorAll('.track-node');

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        audioEl.addEventListener('timeupdate', () => {
            timeDisplay.innerText = `${formatTime(audioEl.currentTime)} // ${formatTime(audioEl.duration)}`;
        });

        audioEl.addEventListener('ended', () => {
            statusLabel.innerText = "RESONANCE COMPLETED";
            tracks.forEach(t => t.classList.remove('playing'));
        });

        tracks.forEach(track => {
            track.addEventListener('click', () => {
                initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const src = track.getAttribute('data-src');
                const title = track.getAttribute('data-title');

                if (track.classList.contains('playing')) {
                    if (audioEl.paused) {
                        audioEl.play();
                        statusLabel.innerText = "NOW RESONATING";
                    } else {
                        audioEl.pause();
                        statusLabel.innerText = "RESONANCE SUSPENDED";
                    }
                    return;
                }

                tracks.forEach(t => t.classList.remove('playing'));
                track.classList.add('playing');
                
                audioEl.src = src;
                audioEl.load(); 
                audioEl.play().catch(err => {
                    console.log("Audio playback waiting on verification profile.", err);
                });
                
                displayTitle.innerText = title;
                statusLabel.innerText = "NOW RESONATING";
                monolith.innerText = title.substring(0, 1) + ".00" + track.querySelector('.dir-index').innerText.substring(2);
            });
        });
    </script>
</body>
</html>
