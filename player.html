<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNT // AUDIO TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --void: #020202;
            --ash: #ececec;
            --pure-light: #ffffff;
            --ghost: rgba(255, 255, 255, 0.08);
            
            --mono-font: 'Space Mono', monospace;
            --serif-font: 'Cormorant Garamond', serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none; 
            user-select: none;
        }

        body {
            background-color: var(--void);
            color: var(--ash);
            font-family: var(--mono-font);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* --- THE REACTIVE AURA --- */
        #ambient-glow {
            position: fixed;
            top: 50%; left: 50%;
            width: 70vw; height: 70vw;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s ease, transform 0.1s ease, background 0.5s ease;
        }

        /* --- HARSH B&W NOISE --- */
        #lo-fi-grain {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.15;
            mix-blend-mode: overlay;
        }

        /* --- REACTIVE AUDIO VISUALIZER CANVAS --- */
        #visualizer-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            filter: drop-shadow(0 0 12px rgba(255,255,255,0.6));
        }

        /* --- CROSSHAIR CURSOR --- */
        #crosshair-cursor {
            position: fixed;
            top: 0; left: 0;
            width: 40px; height: 40px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), height 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.2s;
        }

        #crosshair-cursor::before, #crosshair-cursor::after {
            content: ''; position: absolute;
            background-color: rgba(255,255,255,0.5);
            transition: all 0.2s ease;
        }
        
        #crosshair-cursor::before { width: 100%; height: 1px; }
        #crosshair-cursor::after { height: 100%; width: 1px; }

        .hovering #crosshair-cursor { width: 80px; height: 80px; transform: translate(-50%, -50%) rotate(45deg); }
        .hovering #crosshair-cursor::before, .hovering #crosshair-cursor::after { background-color: var(--pure-light); box-shadow: 0 0 10px var(--pure-light); }

        /* --- PROFESSIONAL ARCHITECTURE GRID --- */
        .brutalist-grid {
            display: grid;
            grid-template-columns: 100px 1fr 450px;
            height: 100vh;
            width: 100vw;
            position: relative;
            z-index: 10;
        }

        .panel {
            border-right: 1px solid var(--ghost);
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .left-axis { padding: 40px 0; align-items: center; border-right: 1px solid rgba(255,255,255,0.08); }
        .sigil { font-family: var(--serif-font); font-style: italic; font-size: 2rem; color: rgba(255,255,255,0.6); text-decoration: none; transition: all 0.3s; }
        .sigil:hover { color: var(--pure-light); text-shadow: 0 0 15px var(--pure-light); transform: scale(1.1); }
        .vertical-marker { transform: rotate(-90deg); white-space: nowrap; font-size: 0.55rem; color: rgba(255, 255, 255, 0.3); letter-spacing: 6px; text-transform: uppercase;}

        .center-nave { padding: 60px 80px; justify-content: space-between; pointer-events: none; }
        .header-block { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; }

        .audio-status { font-size: 0.65rem; font-weight: 700; letter-spacing: 4px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; }
        .audio-status span { color: var(--pure-light); }

        /* Current Track Display */
        .current-track-display { text-align: left; margin-top: auto; margin-bottom: 60px; pointer-events: auto;}
        .current-index { font-family: var(--serif-font); font-style: italic; font-size: 3rem; color: rgba(255,255,255,0.3); line-height: 1; }
        .current-title { font-size: 4rem; font-weight: 700; letter-spacing: -2px; color: var(--pure-light); line-height: 1; margin-top: 10px; }
        .play-toggle { display: inline-block; margin-top: 20px; font-size: 0.8rem; letter-spacing: 3px; border: 1px solid var(--ghost); padding: 10px 20px; transition: all 0.3s; }
        .play-toggle:hover { border-color: var(--pure-light); background: var(--pure-light); color: var(--void); }

        /* Timeline Scrubber */
        .timeline-container { width: 100%; display: flex; align-items: center; gap: 20px; pointer-events: auto; }
        .time-display { font-size: 0.7rem; letter-spacing: 1px; font-weight: 700; width: 40px; text-align: center;}
        .progress-bar-bg { flex-grow: 1; height: 1px; background-color: var(--ghost); position: relative; padding: 15px 0; background-clip: content-box; }
        .progress-bar-fill { position: absolute; top: 15px; left: 0; height: 1px; background-color: var(--pure-light); width: 0%; box-shadow: 0 0 10px var(--pure-light); transition: width 0.1s linear;}

        /* --- INDEX ARCHIVE (PLAYLIST) --- */
        .right-cloisters { border-right: none; padding: 60px 50px; justify-content: center; background: linear-gradient(to right, rgba(0,0,0,0), rgba(2,2,2,0.9)); }
        .section-header { font-size: 0.6rem; color: rgba(255, 255, 255, 0.3); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 50px; }

        .directory-list { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--ghost); }

        .dir-node {
            display: grid;
            grid-template-columns: 40px 1fr;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--ghost);
            text-decoration: none;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .dir-node::before {
            content: ''; position: absolute;
            left: -20px; top: 50%; transform: translateY(-50%);
            width: 0px; height: 1px;
            background-color: var(--pure-light);
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1), left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dir-node:hover, .dir-node.active-track {
            color: var(--pure-light);
            padding-left: 20px; 
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.04) 0%, transparent 100%);
        }

        .dir-node:hover::before, .dir-node.active-track::before { width: 30px; left: -10px; }
        
        .dir-index { font-family: var(--serif-font); font-style: italic; font-size: 1.2rem; transition: color 0.3s; }
        .dir-node:hover .dir-index, .dir-node.active-track .dir-index { color: var(--pure-light); }
        
        .dir-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; transition: letter-spacing 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .dir-node:hover .dir-title, .dir-node.active-track .dir-title { letter-spacing: 2px; }
        
        .dir-spec { font-size: 0.55rem; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }

        /* Environmental glitch controlled by bass */
        .glitch-shake { animation: hard-shake 0.1s infinite; }
        @keyframes hard-shake {
            0% { transform: translate(3px, 2px) }
            50% { transform: translate(-3px, -2px) }
            100% { transform: translate(3px, -2px) }
        }

        @media (max-width: 1024px) {
            .brutalist-grid { grid-template-columns: 1fr; height: auto; }
            .left-axis { display: none; }
            .right-cloisters { height: auto; padding: 40px 20px; background: #000;}
            .center-nave { padding: 40px 20px; }
            body { overflow: auto; cursor: auto;}
            #crosshair-cursor, #lo-fi-grain, #visualizer-canvas { display: none; }
        }
    </style>
</head>
<body>

    <audio id="audio-source" crossorigin="anonymous"></audio>

    <div id="ambient-glow"></div>
    <canvas id="lo-fi-grain"></canvas>
    <canvas id="visualizer-canvas"></canvas>

    <div id="crosshair-cursor"></div>

    <div class="brutalist-grid">
        <div class="panel left-axis">
            <a href="index.html" class="sigil interactive">†</a>
            <div class="vertical-marker">RETURN // ARCHIVE</div>
            <div class="vertical-marker" style="color: rgba(255,255,255,0.8);">0X1900</div>
        </div>

        <div class="panel center-nave">
            <div class="header-block">
                <div class="audio-status" id="system-status">SYSTEM // <span id="status-text">AWAITING INPUT</span></div>
            </div>

            <div class="current-track-display">
                <div class="current-index" id="display-index">00</div>
                <div class="current-title" id="display-title">SELECT TRACK</div>
                <div class="play-toggle interactive" id="play-btn">PLAY</div>
            </div>

            <div class="timeline-container interactive" id="timeline">
                <div class="time-display" id="current-time">0:00</div>
                <div class="progress-bar-bg" id="progress-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <div class="time-display" id="duration">0:00</div>
            </div>
        </div>

        <div class="panel right-cloisters">
            <div>
                <div class="section-header">// AUDIO DIRECTORY</div>
                <nav class="directory-list">
                    
                    <div class="dir-node interactive track-select" data-src="song1.mp3" data-vis="1" data-index="01" data-title="INSTRUMENTAL">
                        <div class="dir-index">01</div>
                        <div class="dir-content">
                            <div class="dir-title">INSTRUMENTAL</div>
                            <div class="dir-spec">Vis 01 // The Jagged Halo</div>
                        </div>
                    </div>
                    
                    <div class="dir-node interactive track-select" data-src="song2.mp3" data-vis="2" data-index="02" data-title="OBSIDIAN_TEARS">
                        <div class="dir-index">02</div>
                        <div class="dir-content">
                            <div class="dir-title">OBSIDIAN_TEARS</div>
                            <div class="dir-spec">Vis 02 // Brutalist Scanner</div>
                        </div>
                    </div>

                    <div class="dir-node interactive track-select" data-src="song3.mp3" data-vis="3" data-index="03" data-title="STATIC_HEAVEN">
                        <div class="dir-index">03</div>
                        <div class="dir-content">
                            <div class="dir-title">STATIC_HEAVEN</div>
                            <div class="dir-spec">Vis 03 // Collapsing Geometry</div>
                        </div>
                    </div>

                </nav>
            </div>
        </div>
    </div>

    <script>
        // --- 1. HARSH B&W NOISE ENGINE ---
        const grainCanvas = document.getElementById('lo-fi-grain');
        const grainCtx = grainCanvas.getContext('2d', { alpha: false });
        let noiseCacheCanvas = null;
        
        function initNoiseEngine() {
            grainCanvas.width = window.innerWidth;
            grainCanvas.height = window.innerHeight;
            const idata = grainCtx.createImageData(grainCanvas.width, grainCanvas.height);
            const buffer32 = new Uint32Array(idata.data.buffer);
            for (let i = 0; i < buffer32.length; i++) {
                buffer32[i] = Math.random() < 0.2 ? 0xff000000 : 0xffffffff; 
            }
            noiseCacheCanvas = document.createElement('canvas');
            noiseCacheCanvas.width = grainCanvas.width;
            noiseCacheCanvas.height = grainCanvas.height;
            noiseCacheCanvas.getContext('2d').putImageData(idata, 0, 0);
        }

        function drawBlitNoise() {
            if (!noiseCacheCanvas) return;
            const jitterX = Math.floor((Math.random() * 30) - 15);
            const jitterY = Math.floor((Math.random() * 30) - 15);
            grainCtx.clearRect(0, 0, grainCanvas.width, grainCanvas.height);
            grainCtx.drawImage(noiseCacheCanvas, jitterX, jitterY);
        }
        window.addEventListener('resize', initNoiseEngine);
        initNoiseEngine();
        setInterval(drawBlitNoise, 40); 

        // --- 2. CURSOR PHYSICS & MOMENTUM ---
        const crosshairCursor = document.getElementById('crosshair-cursor');
        let curX = window.innerWidth / 2, curY = window.innerHeight / 2;
        let tarX = curX, tarY = curY;

        document.addEventListener('mousemove', (e) => { tarX = e.clientX; tarY = e.clientY; });

        function renderCursor() {
            curX += (tarX - curX) * 0.25; 
            curY += (tarY - curY) * 0.25;
            crosshairCursor.style.left = curX + 'px';
            crosshairCursor.style.top = curY + 'px';
            requestAnimationFrame(renderCursor);
        }
        renderCursor();

        document.querySelectorAll('.interactive').forEach(el => {
            el.addEventListener('mouseenter', () => crosshairCursor.classList.add('hovering'));
            el.addEventListener('mouseleave', () => crosshairCursor.classList.remove('hovering'));
        });


        // --- 3. DYNAMIC AUDIO VISUALIZER ENGINE ---
        const audioEl = document.getElementById('audio-source');
        const visCanvas = document.getElementById('visualizer-canvas');
        const visCtx = visCanvas.getContext('2d');
        const ambientGlow = document.getElementById('ambient-glow');
        
        // UI Elements
        const statusText = document.getElementById('status-text');
        const displayIndex = document.getElementById('display-index');
        const displayTitle = document.getElementById('display-title');
        const playBtn = document.getElementById('play-btn');
        const trackNodes = document.querySelectorAll('.track-select');
        
        let audioCtx, analyser, source;
        let dataArray, bufferLength;
        let isPlaying = false;
        let audioInitialized = false;
        let currentVisMode = 1;

        function resizeCanvas() {
            visCanvas.width = window.innerWidth;
            visCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function initWebAudio() {
            if (audioInitialized) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audioEl);
            
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            analyser.fftSize = 256; 
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            audioInitialized = true;
        }

        // --- TRACK SELECTION LOGIC ---
        trackNodes.forEach(node => {
            node.addEventListener('click', () => {
                initWebAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                // Clear active states
                trackNodes.forEach(n => n.classList.remove('active-track'));
                node.classList.add('active-track');

                // Update Data
                const src = node.getAttribute('data-src');
                const title = node.getAttribute('data-title');
                const index = node.getAttribute('data-index');
                currentVisMode = parseInt(node.getAttribute('data-vis'));

                // Only reload if it's a new track
                if (!audioEl.src.endsWith(src)) {
                    audioEl.src = src;
                }

                // Update UI
                displayIndex.innerText = index;
                displayTitle.innerText = title;

                // Play
                audioEl.play();
                isPlaying = true;
                playBtn.innerText = "PAUSE";
                statusText.innerText = "RESONATING";
                renderVisualizer();
            });
        });

        // --- PLAY/PAUSE TOGGLE ---
        playBtn.addEventListener('click', () => {
            if (!audioInitialized) return; // Wait until a track is selected
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (isPlaying) {
                audioEl.pause();
                playBtn.innerText = "PLAY";
                statusText.innerText = "PAUSED";
            } else {
                audioEl.play();
                playBtn.innerText = "PAUSE";
                statusText.innerText = "RESONATING";
                renderVisualizer();
            }
            isPlaying = !isPlaying;
        });


        // --- MULTI-MODE RENDER LOOP ---
        function renderVisualizer() {
            if (!isPlaying) return;
            requestAnimationFrame(renderVisualizer);

            analyser.getByteFrequencyData(dataArray);
            visCtx.clearRect(0, 0, visCanvas.width, visCanvas.height);

            const centerX = visCanvas.width / 2;
            const centerY = visCanvas.height / 2;
            
            // Frequency extraction
            let bassSum = 0; for(let i = 0; i < 5; i++) bassSum += dataArray[i];
            const bassAvg = bassSum / 5;
            let midSum = 0; for(let i = 10; i < 50; i++) midSum += dataArray[i];
            const midAvg = midSum / 40;

            // Global Ambient Glow (Reacts to Bass)
            ambientGlow.style.opacity = (bassAvg / 255) * 0.4;
            ambientGlow.style.transform = `translate(-50%, -50%) scale(${1 + (bassAvg / 255) * 0.6})`;

            // Glitch Shake on absolute peak bass
            if (bassAvg > 230) document.body.classList.add('glitch-shake');
            else document.body.classList.remove('glitch-shake');

            // -----------------------------------------------------
            // VISUALIZER MODE 1: THE JAGGED HALO (Circular Tearing)
            // -----------------------------------------------------
            if (currentVisMode === 1) {
                const baseRadius = 150 + (bassAvg * 0.2);
                const points = bufferLength - 20; 
                const angleStep = (Math.PI * 2) / points;

                // Inner core
                visCtx.beginPath();
                visCtx.arc(centerX, centerY, baseRadius - 20, 0, Math.PI * 2);
                visCtx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                visCtx.stroke();

                // Tearing spikes
                visCtx.beginPath();
                for (let i = 0; i < points; i++) {
                    const value = dataArray[i];
                    const spikeAmp = (value / 255) * 200; 
                    const angle = (i * angleStep) + (Date.now() * 0.0005); // Slow rotation
                    
                    const r = baseRadius + spikeAmp;
                    const x = centerX + Math.cos(angle) * r;
                    const y = centerY + Math.sin(angle) * r;

                    if (i === 0) visCtx.moveTo(x, y);
                    else visCtx.lineTo(x, y);
                }
                visCtx.closePath();
                visCtx.strokeStyle = '#ffffff';
                visCtx.lineWidth = 1.5; 
                visCtx.stroke();

                // Ley lines connecting spikes
                visCtx.beginPath();
                for (let i = 0; i < points; i += 6) {
                    const r = baseRadius + ((dataArray[i] / 255) * 200);
                    const angle = (i * angleStep) + (Date.now() * 0.0005);
                    visCtx.moveTo(centerX, centerY);
                    visCtx.lineTo(centerX + Math.cos(angle) * r, centerY + Math.sin(angle) * r);
                }
                visCtx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                visCtx.stroke();
            }

            // -----------------------------------------------------
            // VISUALIZER MODE 2: BRUTALIST SCANNER (Vertical Data)
            // -----------------------------------------------------
            else if (currentVisMode === 2) {
                const barWidth = visCanvas.width / bufferLength;
                
                visCtx.fillStyle = '#ffffff';
                for (let i = 0; i < bufferLength; i++) {
                    const value = dataArray[i];
                    const percent = value / 255;
                    const height = percent * (visCanvas.height / 2);
                    const x = i * barWidth;
                    
                    // Draw from center top and bottom
                    visCtx.fillRect(x, centerY - height, barWidth - 1, height * 2);
                }

                // Scanline effect
                const scanlineY = (Date.now() * 0.5) % visCanvas.height;
                visCtx.fillStyle = 'rgba(255,255,255,0.5)';
                visCtx.fillRect(0, scanlineY, visCanvas.width, 2);
            }

            // -----------------------------------------------------
            // VISUALIZER MODE 3: COLLAPSING GEOMETRY (Sacred Hexagon)
            // -----------------------------------------------------
            else if (currentVisMode === 3) {
                const rotation = Date.now() * 0.0002;
                const sides = 6;
                const baseRad = 200 + (bassAvg * 0.5);

                function drawPoly(radius, offsetRot, strokeOpacity, distortAmp) {
                    visCtx.beginPath();
                    for (let i = 0; i <= sides; i++) {
                        const angle = (i * (Math.PI * 2) / sides) + offsetRot;
                        // Map specific frequency bins to specific vertices for targeted distortion
                        const freqIdx = Math.floor((i / sides) * 20); 
                        const distortion = (dataArray[freqIdx] / 255) * distortAmp;
                        
                        const r = radius + distortion;
                        const x = centerX + Math.cos(angle) * r;
                        const y = centerY + Math.sin(angle) * r;
                        
                        if (i === 0) visCtx.moveTo(x, y);
                        else visCtx.lineTo(x, y);
                    }
                    visCtx.strokeStyle = `rgba(255, 255, 255, ${strokeOpacity})`;
                    visCtx.lineWidth = 2;
                    visCtx.stroke();
                }

                // Multiple overlapping, counter-rotating layers
                drawPoly(baseRad, rotation, 1, 150); // Main reactive shell
                drawPoly(baseRad * 0.7, -rotation * 1.5, 0.4, 80); // Inner core
                drawPoly(baseRad * 1.3, rotation * 0.5, 0.1, 200); // Outer phantom

                // Connecting structure
                visCtx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (i * (Math.PI * 2) / sides) + rotation;
                    const r = baseRad + ((dataArray[0] / 255) * 150);
                    visCtx.moveTo(centerX, centerY);
                    visCtx.lineTo(centerX + Math.cos(angle) * r, centerY + Math.sin(angle) * r);
                }
                visCtx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                visCtx.stroke();
            }
        }

        // --- 4. TIMELINE & SCRUBBING UI ---
        const progressBg = document.getElementById('progress-bg');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        audioEl.addEventListener('loadedmetadata', () => {
            durationEl.innerText = formatTime(audioEl.duration);
        });

        audioEl.addEventListener('timeupdate', () => {
            currentTimeEl.innerText = formatTime(audioEl.currentTime);
            const percent = (audioEl.currentTime / audioEl.duration) * 100;
            progressFill.style.width = `${percent}%`;
        });

        audioEl.addEventListener('ended', () => {
            isPlaying = false;
            playBtn.innerText = "PLAY";
            statusText.innerText = "SYSTEM IDLE";
            progressFill.style.width = `0%`;
            visCtx.clearRect(0, 0, visCanvas.width, visCanvas.height);
        });

        // Click to scrub timeline
        progressBg.addEventListener('click', (e) => {
            if (!audioEl.src) return; // Prevent scrub if no track loaded
            const rect = progressBg.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percent = clickX / rect.width;
            audioEl.currentTime = percent * audioEl.duration;
        });

    </script>
</body>
</html>
