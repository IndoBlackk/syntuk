<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNT // AUDIO TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --void: #020202;
            --ash: #ececec;
            --pure-light: #ffffff;
            --ghost: rgba(255, 255, 255, 0.08);
            
            --mono-font: 'Space Mono', monospace;
            --serif-font: 'Cormorant Garamond', serif;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            cursor: none; user-select: none;
        }

        body {
            background-color: var(--void);
            color: var(--ash);
            font-family: var(--mono-font);
            overflow: hidden;
            height: 100vh; width: 100vw;
            position: relative;
            /* Transition for the reality invert */
            transition: filter 0.1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- THE REALITY CRUSH (Click & Hold) --- */
        body.crushing {
            filter: invert(1) hue-rotate(180deg) contrast(1.2);
        }

        body.crushing #visual-engine {
            transform: scale(1.03) skew(-1deg);
        }

        body.crushing .brutalist-grid {
            transform: translate(2px, 2px);
        }

        /* --- VISUAL ENGINE WRAPPER --- */
        #visual-engine {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.05s ease;
        }

        #visualizer-canvas {
            position: absolute; width: 100%; height: 100%;
            /* Pure monochrome glow */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
        }

        #lo-fi-grain {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; opacity: 0.15; mix-blend-mode: overlay;
        }

        /* --- PRECISION CROSSHAIR --- */
        #crosshair-cursor {
            position: fixed; top: 0; left: 0; width: 40px; height: 40px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), height 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.2s;
        }

        #crosshair-cursor::before, #crosshair-cursor::after {
            content: ''; position: absolute; background-color: rgba(255,255,255,0.5); transition: all 0.2s ease;
        }
        
        #crosshair-cursor::before { width: 100%; height: 1px; }
        #crosshair-cursor::after { height: 100%; width: 1px; }

        .hovering #crosshair-cursor { width: 80px; height: 80px; transform: translate(-50%, -50%) rotate(45deg); }
        .hovering #crosshair-cursor::before, .hovering #crosshair-cursor::after { background-color: var(--pure-light); box-shadow: 0 0 10px var(--pure-light); }

        body.crushing #crosshair-cursor { width: 120px; height: 12px; transform: translate(-50%, -50%) rotate(0deg); }
        body.crushing #crosshair-cursor::before { height: 2px; background-color: var(--void); }
        body.crushing #crosshair-cursor::after { display: none; }

        /* --- UI ARCHITECTURE --- */
        .brutalist-grid {
            display: grid; grid-template-columns: 100px 1fr 450px;
            height: 100vh; width: 100vw; position: relative; z-index: 10;
        }

        .panel {
            border-right: 1px solid var(--ghost); position: relative;
            height: 100%; display: flex; flex-direction: column; justify-content: space-between;
        }

        /* The Return Sequence */
        .left-axis { padding: 40px 0; align-items: center; border-right: 1px solid rgba(255,255,255,0.08); }
        .return-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .sigil { font-family: var(--serif-font); font-style: italic; font-size: 2rem; color: rgba(255,255,255,0.6); text-decoration: none; transition: all 0.3s; }
        .sigil:hover { color: var(--pure-light); text-shadow: 0 0 15px var(--pure-light); transform: scale(1.1); }
        .return-text { transform: rotate(-90deg); white-space: nowrap; font-size: 0.55rem; color: var(--pure-light); letter-spacing: 6px; margin-top: 60px; opacity: 0; transition: opacity 0.3s; }
        .sigil:hover + .return-text { opacity: 1; }
        .vertical-marker { transform: rotate(-90deg); white-space: nowrap; font-size: 0.55rem; color: rgba(255, 255, 255, 0.3); letter-spacing: 6px; text-transform: uppercase;}

        .center-nave { padding: 60px 80px; justify-content: space-between; pointer-events: none; }
        .header-block { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; }

        .audio-status { font-size: 0.65rem; font-weight: 700; letter-spacing: 4px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; }
        .audio-status span { color: var(--pure-light); }

        /* Audio-Reactive Typography */
        .current-track-display { text-align: left; margin-top: auto; margin-bottom: 60px; pointer-events: auto;}
        .current-index { font-family: var(--serif-font); font-style: italic; font-size: 3rem; color: rgba(255,255,255,0.3); line-height: 1; }
        .current-title { 
            font-size: 4rem; font-weight: 700; letter-spacing: -2px; color: var(--pure-light); 
            line-height: 1; margin-top: 10px; text-transform: uppercase;
            transition: letter-spacing 0.05s ease, transform 0.05s ease;
            transform-origin: left center;
        }
        
        .play-toggle { display: inline-block; margin-top: 20px; font-size: 0.8rem; letter-spacing: 3px; border: 1px solid var(--ghost); padding: 10px 20px; transition: all 0.3s; }
        .play-toggle:hover { border-color: var(--pure-light); background: var(--pure-light); color: var(--void); }

        /* Timeline Scrubber */
        .timeline-container { width: 100%; display: flex; align-items: center; gap: 20px; pointer-events: auto; }
        .time-display { font-size: 0.7rem; letter-spacing: 1px; font-weight: 700; width: 40px; text-align: center;}
        .progress-bar-bg { flex-grow: 1; height: 1px; background-color: var(--ghost); position: relative; padding: 15px 0; background-clip: content-box; }
        .progress-bar-fill { position: absolute; top: 15px; left: 0; height: 1px; background-color: var(--pure-light); width: 0%; box-shadow: 0 0 10px var(--pure-light); pointer-events: none;}

        /* --- INDEX ARCHIVE (PLAYLIST) --- */
        .right-cloisters { border-right: none; padding: 60px 50px; justify-content: center; background: linear-gradient(to right, rgba(0,0,0,0), rgba(2,2,2,0.9)); }
        .section-header { font-size: 0.6rem; color: rgba(255, 255, 255, 0.3); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 50px; }
        .directory-list { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--ghost); }

        .dir-node {
            display: grid; grid-template-columns: 40px 1fr; align-items: center;
            padding: 30px 0; border-bottom: 1px solid var(--ghost);
            text-decoration: none; color: rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative;
        }

        .dir-node::before {
            content: ''; position: absolute; left: -20px; top: 50%; transform: translateY(-50%);
            width: 0px; height: 1px; background-color: var(--pure-light);
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1), left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dir-node:hover, .dir-node.active-track {
            color: var(--pure-light); padding-left: 20px; 
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.04) 0%, transparent 100%);
        }

        .dir-node:hover::before, .dir-node.active-track::before { width: 30px; left: -10px; }
        .dir-index { font-family: var(--serif-font); font-style: italic; font-size: 1.2rem; transition: color 0.3s; }
        .dir-node:hover .dir-index, .dir-node.active-track .dir-index { color: var(--pure-light); }
        .dir-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; transition: letter-spacing 0.4s cubic-bezier(0.16, 1, 0.3, 1); text-transform: uppercase; }
        .dir-node:hover .dir-title, .dir-node.active-track .dir-title { letter-spacing: 2px; }
        .dir-spec { font-size: 0.55rem; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }

        @media (max-width: 1024px) {
            .brutalist-grid { grid-template-columns: 1fr; height: auto; }
            .left-axis { display: none; }
            .right-cloisters { height: auto; padding: 40px 20px; background: #000;}
            .center-nave { padding: 40px 20px; }
            body { overflow: auto; cursor: auto;}
            #crosshair-cursor, #lo-fi-grain, #visual-engine { display: none; }
        }
    </style>
</head>
<body>

    <audio id="audio-source" crossorigin="anonymous"></audio>

    <div id="visual-engine">
        <canvas id="visualizer-canvas"></canvas>
    </div>
    
    <canvas id="lo-fi-grain"></canvas>
    <div id="crosshair-cursor"></div>

    <div class="brutalist-grid">
        <div class="panel left-axis">
            <div class="return-wrapper">
                <a href="index.html" class="sigil interactive">†</a>
                <div class="return-text">[ RETURN TO ARCHIVE ]</div>
            </div>
            <div class="vertical-marker" style="margin-top: auto; color: rgba(255,255,255,0.8);">0X1900</div>
        </div>

        <div class="panel center-nave">
            <div class="header-block">
                <div class="audio-status" id="system-status">SYSTEM // <span id="status-text">AWAITING INPUT</span></div>
                <div class="audio-status">HOLD CLICK TO <span style="color:#ffffff;">[ CRUSH ]</span></div>
            </div>

            <div class="current-track-display">
                <div class="current-index" id="display-index">00</div>
                <div class="current-title" id="display-title">SELECT TRACK</div>
                <div class="play-toggle interactive" id="play-btn">PLAY</div>
            </div>

            <div class="timeline-container interactive" id="timeline">
                <div class="time-display" id="current-time">0:00</div>
                <div class="progress-bar-bg" id="progress-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <div class="time-display" id="duration">0:00</div>
            </div>
        </div>

        <div class="panel right-cloisters">
            <div>
                <div class="section-header">// AUDIO DIRECTORY</div>
                <nav class="directory-list">
                    
                    <div class="dir-node interactive track-select" data-src="song1.mp3" data-vis="1" data-index="01" data-title="INSTRUMENTAL">
                        <div class="dir-index">01</div>
                        <div class="dir-content">
                            <div class="dir-title">INSTRUMENTAL</div>
                            <div class="dir-spec">Vis 01 // The Sacred Cipher</div>
                        </div>
                    </div>
                    
                    <div class="dir-node interactive track-select" data-src="song2.mp3" data-vis="2" data-index="02" data-title="DEMO_ONE">
                        <div class="dir-index">02</div>
                        <div class="dir-content">
                            <div class="dir-title">DEMO_ONE</div>
                            <div class="dir-spec">Vis 02 // The Void Scanner</div>
                        </div>
                    </div>

                    <div class="dir-node interactive track-select" data-src="song3.mp3" data-vis="3" data-index="03" data-title="DEMO_TWO">
                        <div class="dir-index">03</div>
                        <div class="dir-content">
                            <div class="dir-title">DEMO_TWO</div>
                            <div class="dir-spec">Vis 03 // Collapsing Arch</div>
                        </div>
                    </div>

                </nav>
            </div>
        </div>
    </div>

    <script>
        // --- 1. HARSH B&W NOISE ENGINE ---
        const grainCanvas = document.getElementById('lo-fi-grain');
        const grainCtx = grainCanvas.getContext('2d', { alpha: false });
        let noiseCacheCanvas = null;
        
        function initNoiseEngine() {
            grainCanvas.width = window.innerWidth; grainCanvas.height = window.innerHeight;
            const idata = grainCtx.createImageData(grainCanvas.width, grainCanvas.height);
            const buffer32 = new Uint32Array(idata.data.buffer);
            for (let i = 0; i < buffer32.length; i++) buffer32[i] = Math.random() < 0.2 ? 0xff000000 : 0xffffffff; 
            noiseCacheCanvas = document.createElement('canvas');
            noiseCacheCanvas.width = grainCanvas.width; noiseCacheCanvas.height = grainCanvas.height;
            noiseCacheCanvas.getContext('2d').putImageData(idata, 0, 0);
        }

        function drawBlitNoise() {
            if (!noiseCacheCanvas) return;
            const jitterX = Math.floor((Math.random() * 30) - 15);
            const jitterY = Math.floor((Math.random() * 30) - 15);
            grainCtx.clearRect(0, 0, grainCanvas.width, grainCanvas.height);
            grainCtx.drawImage(noiseCacheCanvas, jitterX, jitterY);
        }
        window.addEventListener('resize', initNoiseEngine);
        initNoiseEngine(); setInterval(drawBlitNoise, 40); 

        // --- 2. CURSOR PHYSICS ---
        const crosshairCursor = document.getElementById('crosshair-cursor');
        let curX = window.innerWidth / 2, curY = window.innerHeight / 2;
        let tarX = curX, tarY = curY;

        document.addEventListener('mousemove', (e) => { tarX = e.clientX; tarY = e.clientY; });

        function renderCursor() {
            curX += (tarX - curX) * 0.25; curY += (tarY - curY) * 0.25;
            crosshairCursor.style.left = curX + 'px'; crosshairCursor.style.top = curY + 'px';
            requestAnimationFrame(renderCursor);
        }
        renderCursor();

        document.querySelectorAll('.interactive').forEach(el => {
            el.addEventListener('mouseenter', () => crosshairCursor.classList.add('hovering'));
            el.addEventListener('mouseleave', () => crosshairCursor.classList.remove('hovering'));
        });


        // --- 3. DYNAMIC AUDIO VISUALIZER ENGINE ---
        const audioEl = document.getElementById('audio-source');
        const visCanvas = document.getElementById('visualizer-canvas');
        const visCtx = visCanvas.getContext('2d');
        
        // UI Elements
        const statusText = document.getElementById('status-text');
        const displayIndex = document.getElementById('display-index');
        const displayTitle = document.getElementById('display-title');
        const playBtn = document.getElementById('play-btn');
        const trackNodes = document.querySelectorAll('.track-select');
        
        let audioCtx, analyser, source, waveShaper;
        let dataArray, bufferLength;
        let isPlaying = false;
        let audioInitialized = false;
        let currentVisMode = 1;

        function resizeCanvas() {
            visCanvas.width = window.innerWidth; visCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function generateDistortionCurve(amount = 20) {
            const k = amount, n_samples = 44100, curve = new Float32Array(n_samples);
            for (let i = 0; i < n_samples; ++i) {
                const x = (i * 2) / n_samples - 1;
                curve[i] = Math.tanh(x * k) / Math.tanh(k);
            }
            return curve;
        }

        function initWebAudio() {
            if (audioInitialized) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audioEl);
            
            waveShaper = audioCtx.createWaveShaper();
            waveShaper.curve = generateDistortionCurve(0);

            source.connect(waveShaper);
            waveShaper.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            analyser.fftSize = 512; 
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            audioInitialized = true;
        }

        // --- TRACK SELECTION ---
        trackNodes.forEach(node => {
            node.addEventListener('click', () => {
                initWebAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();

                trackNodes.forEach(n => n.classList.remove('active-track'));
                node.classList.add('active-track');

                const src = node.getAttribute('data-src');
                const title = node.getAttribute('data-title');
                const index = node.getAttribute('data-index');
                currentVisMode = parseInt(node.getAttribute('data-vis'));

                if (!audioEl.src.endsWith(src)) audioEl.src = src;

                displayIndex.innerText = index;
                displayTitle.innerText = title;

                // Corrupted Digital "Crunch" on track switch
                waveShaper.curve = generateDistortionCurve(100);
                setTimeout(() => { if(!document.body.classList.contains('crushing')) waveShaper.curve = generateDistortionCurve(0); }, 100);

                audioEl.play();
                isPlaying = true;
                playBtn.innerText = "PAUSE";
                statusText.innerText = "RESONATING";
                renderVisualizer();
            });
        });

        // --- THE "CRUSH" MECHANIC (Click & Hold) ---
        // Inverts reality and blows out the track
        document.addEventListener('mousedown', (e) => {
            if (e.target.closest('.interactive') || !audioInitialized) return;
            document.body.classList.add('crushing');
            if(audioCtx) waveShaper.curve = generateDistortionCurve(800); 
        });

        document.addEventListener('mouseup', () => {
            if (!audioInitialized) return;
            document.body.classList.remove('crushing');
            if(audioCtx) waveShaper.curve = generateDistortionCurve(0);
        });


        // --- PLAY/PAUSE TOGGLE ---
        playBtn.addEventListener('click', () => {
            if (!audioInitialized) return; 
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (isPlaying) {
                audioEl.pause(); playBtn.innerText = "PLAY"; statusText.innerText = "PAUSED";
                displayTitle.style.letterSpacing = "-2px"; 
                displayTitle.style.transform = "scaleX(1)";
            } else {
                audioEl.play(); playBtn.innerText = "PAUSE"; statusText.innerText = "RESONATING";
                renderVisualizer();
            }
            isPlaying = !isPlaying;
        });


        // --- MASTER RENDER LOOP ---
        function renderVisualizer() {
            if (!isPlaying) return;
            requestAnimationFrame(renderVisualizer);

            analyser.getByteFrequencyData(dataArray);
            visCtx.clearRect(0, 0, visCanvas.width, visCanvas.height);

            const centerX = visCanvas.width / 2; const centerY = visCanvas.height / 2;
            
            // Extract specific frequency bands
            let bassSum = 0; for(let i = 0; i < 4; i++) bassSum += dataArray[i];
            const bassAvg = bassSum / 4;
            
            let highSum = 0; for(let i = 150; i < 200; i++) highSum += dataArray[i];
            const highAvg = highSum / 50;

            // 1. Audio-Reactive Typography (The UI Breathes)
            // Stretches the text physically when bass hits
            const textStretch = 1 + Math.max(0, (bassAvg - 180) / 400);
            const tracking = -2 + Math.max(0, (bassAvg - 180) / 10);
            displayTitle.style.transform = `scaleX(${textStretch})`;
            displayTitle.style.letterSpacing = `${tracking}px`;

            // --- VIS 1: THE SACRED CIPHER (Needle Halo) ---
            if (currentVisMode === 1) {
                const baseRadius = 180;
                const dataPoints = 90; 
                const angleStep = Math.PI / dataPoints;
                const rotation = Date.now() * 0.0002;

                visCtx.beginPath();
                
                // Draw Right Half
                for (let i = 0; i <= dataPoints; i++) {
                    const val = dataArray[i];
                    // Strict threshold: Only high transient volumes cause spikes
                    const spike = val > 120 ? Math.pow((val - 120) / 135, 2) * 250 : 0; 
                    const r = baseRadius + (i % 2 === 0 ? spike : -spike * 0.2); // Alternating inward/outward
                    const angle = -Math.PI/2 + (i * angleStep) + rotation;
                    
                    const x = centerX + Math.cos(angle)*r;
                    const y = centerY + Math.sin(angle)*r;
                    if (i === 0) visCtx.moveTo(x, y);
                    else visCtx.lineTo(x, y);
                }
                
                // Draw Left Half (Perfect Mirror)
                for (let i = dataPoints; i >= 0; i--) {
                    const val = dataArray[i];
                    const spike = val > 120 ? Math.pow((val - 120) / 135, 2) * 250 : 0; 
                    const r = baseRadius + (i % 2 === 0 ? spike : -spike * 0.2); 
                    const angle = -Math.PI/2 - (i * angleStep) + rotation;
                    visCtx.lineTo(centerX + Math.cos(angle)*r, centerY + Math.sin(angle)*r);
                }
                
                visCtx.closePath();
                visCtx.strokeStyle = '#ffffff'; 
                visCtx.lineWidth = 1; // Razor thin lines
                visCtx.stroke();
                
                // Pulsing Center Core
                if (bassAvg > 200) {
                    visCtx.beginPath();
                    visCtx.arc(centerX, centerY, (bassAvg - 200) * 1.5, 0, Math.PI*2);
                    visCtx.fillStyle = '#ffffff';
                    visCtx.fill();
                }
            }

            // --- VIS 2: THE VOID SCANNER (Corrupted Barcode) ---
            else if (currentVisMode === 2) {
                const bands = 64; 
                const blockHeight = visCanvas.height / bands;
                
                visCtx.fillStyle = '#ffffff';
                for (let i = 0; i < bands; i++) {
                    const val = dataArray[i * 2]; // Sample evenly
                    if (val > 50) {
                        const width = Math.pow(val / 255, 3) * (visCanvas.width * 0.8);
                        const y = i * blockHeight;
                        
                        // Draw from center outwards horizontally
                        visCtx.fillRect(centerX - (width/2), y, width, blockHeight - 2);
                    }
                }
                
                // Random vertical tear on snare/high-hat
                if (highAvg > 100) {
                    visCtx.fillStyle = '#ffffff';
                    const tearX = centerX + (Math.random() * 400 - 200);
                    visCtx.fillRect(tearX, 0, (Math.random() * 10) + 2, visCanvas.height);
                }
            }

            // --- VIS 3: COLLAPSING ARCHITECTURE (Wireframe Tesseract) ---
            else if (currentVisMode === 3) {
                const time = Date.now() * 0.0005;
                const size = 180 + (bassAvg * 0.3);
                
                // 3D Rotation matrices projected to 2D
                const nodes = [];
                for(let i=0; i<8; i++) {
                    // Create basic cube vertices
                    let x = (i & 1 ? 1 : -1);
                    let y = (i & 2 ? 1 : -1);
                    let z = (i & 4 ? 1 : -1);
                    
                    // Audio distortion: Push vertices outward based on frequency
                    const freqVal = dataArray[i * 10] / 255;
                    const push = 1 + (freqVal * 1.5);
                    x *= push; y *= push; z *= push;

                    // Rotate X & Y
                    const rx = x * Math.cos(time) - z * Math.sin(time);
                    const rz = x * Math.sin(time) + z * Math.cos(time);
                    const ry = y * Math.cos(time*0.7) - rz * Math.sin(time*0.7);
                    
                    // Perspective projection
                    const scale = 500 / (500 + rz);
                    nodes.push({ x: centerX + rx * size * scale, y: centerY + ry * size * scale });
                }

                visCtx.strokeStyle = '#ffffff';
                visCtx.lineWidth = 1.5;
                visCtx.beginPath();
                
                // Draw connecting edges
                const edges = [
                    [0,1], [1,3], [3,2], [2,0], // Front face
                    [4,5], [5,7], [7,6], [6,4], // Back face
                    [0,4], [1,5], [2,6], [3,7]  // Connecting lines
                ];
                
                edges.forEach(edge => {
                    visCtx.moveTo(nodes[edge[0]].x, nodes[edge[0]].y);
                    visCtx.lineTo(nodes[edge[1]].x, nodes[edge[1]].y);
                });
                visCtx.stroke();
                
                // Inner chaotic lines when highly active
                if (bassAvg > 150) {
                    visCtx.beginPath();
                    visCtx.strokeStyle = 'rgba(255,255,255,0.3)';
                    visCtx.moveTo(nodes[0].x, nodes[0].y);
                    visCtx.lineTo(nodes[7].x, nodes[7].y);
                    visCtx.moveTo(nodes[1].x, nodes[1].y);
                    visCtx.lineTo(nodes[6].x, nodes[6].y);
                    visCtx.stroke();
                }
            }
        }

        // --- 5. TIMELINE SCRUBBING ---
        const progressBg = document.getElementById('progress-bg');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60), secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        audioEl.addEventListener('loadedmetadata', () => { durationEl.innerText = formatTime(audioEl.duration); });
        
        // Use requestAnimationFrame for smoother scrubber updating instead of timeupdate event
        function updateScrubber() {
            if(isPlaying) {
                currentTimeEl.innerText = formatTime(audioEl.currentTime);
                progressFill.style.width = `${(audioEl.currentTime / audioEl.duration) * 100}%`;
            }
            requestAnimationFrame(updateScrubber);
        }
        updateScrubber();

        audioEl.addEventListener('ended', () => {
            isPlaying = false; playBtn.innerText = "PLAY"; statusText.innerText = "SYSTEM IDLE";
            progressFill.style.width = `0%`; visCtx.clearRect(0, 0, visCanvas.width, visCanvas.height);
            displayTitle.style.letterSpacing = "-2px";
            displayTitle.style.transform = "scaleX(1)";
        });

        progressBg.addEventListener('click', (e) => {
            if (!audioEl.src) return; 
            const rect = progressBg.getBoundingClientRect();
            audioEl.currentTime = ((e.clientX - rect.left) / rect.width) * audioEl.duration;
            if(!isPlaying) {
                currentTimeEl.innerText = formatTime(audioEl.currentTime);
                progressFill.style.width = `${(audioEl.currentTime / audioEl.duration) * 100}%`;
            }
        });
    </script>
</body>
</html>
