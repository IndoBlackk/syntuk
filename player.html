<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> S O U N D </title>
    <!-- TRACKS FAVICON -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23020202'/%3E%3Crect x='5' y='16' width='4' height='10' fill='%23ffffff'/%3E%3Crect x='11' y='8' width='4' height='18' fill='%23ffffff'/%3E%3Crect x='17' y='12' width='4' height='14' fill='%23ffffff'/%3E%3Crect x='23' y='18' width='4' height='8' fill='%23ffffff'/%3E%3C/svg%3E">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --void: #020202;
            --ash: #ececec;
            --pure-light: #ffffff;
            --ghost: rgba(255, 255, 255, 0.08);
            
            --mono-font: 'Space Mono', monospace;
            --serif-font: 'Cormorant Garamond', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; user-select: none; }

        body {
            background-color: var(--void); color: var(--ash);
            font-family: var(--mono-font); overflow: hidden;
            height: 100vh; width: 100vw; position: relative;
            transition: background-color 0.1s ease-out;
        }

        /* --- VISUAL ENGINE --- */
        #visual-engine {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none;
            display: flex; justify-content: center; align-items: center;
        }

        #visualizer-canvas {
            position: absolute; width: 100%; height: 100%;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));
        }

        #lo-fi-grain {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; opacity: 0.05; mix-blend-mode: overlay;
        }

        /* --- 3D GEOMETRIC CURSOR --- */
        #cursor-wrapper {
            position: fixed; top: 0; left: 0; width: 30px; height: 30px;
            pointer-events: none; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            transform: translate(-50%, -50%);
        }

        #geo-cursor {
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            animation: slowSpin 6s linear infinite;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cursor-ring {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
        }

        .cursor-ring:nth-child(2) { transform: rotateX(60deg) rotateY(45deg); border-radius: 0; }
        .cursor-ring:nth-child(3) { transform: rotateX(-60deg) rotateY(-45deg); border-radius: 0; }

        .hovering #geo-cursor { transform: scale(1.5); }
        .hovering .cursor-ring { border-color: var(--pure-light); box-shadow: 0 0 8px rgba(255,255,255,0.4); }
        .clicking #geo-cursor { transform: scale(0.6) rotate(45deg); animation-duration: 1s; }

        @keyframes slowSpin {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        /* --- BRUTALIST UI ARCHITECTURE --- */
        .brutalist-grid {
            display: grid; grid-template-columns: 80px 1fr 450px;
            height: 100vh; width: 100vw; position: relative; z-index: 10;
        }

        .panel {
            border-right: 1px solid var(--ghost); position: relative;
            height: 100%; display: flex; flex-direction: column; justify-content: space-between;
        }

        .left-axis { padding: 40px 0; align-items: center; border-right: 1px solid rgba(255,255,255,0.05); }
        .vertical-marker { transform: rotate(-90deg); white-space: nowrap; font-size: 0.55rem; color: rgba(255, 255, 255, 0.2); letter-spacing: 6px; text-transform: uppercase;}

        .center-nave { padding: 60px 80px; justify-content: space-between; pointer-events: none; }
        
        .header-block { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; pointer-events: auto; }
        
        .back-btn { 
            font-size: 0.7rem; font-weight: 700; letter-spacing: 3px; 
            color: rgba(255, 255, 255, 0.5); text-decoration: none; text-transform: uppercase;
            border: 1px solid transparent; padding: 8px 16px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .back-btn:hover { color: var(--void); background-color: var(--pure-light); border-color: var(--pure-light); letter-spacing: 5px; }

        .current-track-display { text-align: left; margin-top: auto; margin-bottom: 60px; pointer-events: auto;}
        .current-index { font-family: var(--serif-font); font-style: italic; font-size: 3rem; color: rgba(255,255,255,0.2); line-height: 1; }
        .current-title { 
            font-size: 4rem; font-weight: 700; letter-spacing: -2px; color: var(--pure-light); 
            line-height: 1; margin-top: 10px; text-transform: uppercase;
            transition: opacity 0.3s ease, text-shadow 0.3s ease; 
        }
        .current-title:hover { text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }
        
        .controls-row { display: flex; gap: 15px; margin-top: 20px; }
        .btn-toggle { 
            font-size: 0.7rem; letter-spacing: 3px; border: 1px solid var(--ghost); 
            padding: 10px 20px; transition: all 0.3s; color: rgba(255,255,255,0.7);
        }
        .btn-toggle:hover { border-color: var(--pure-light); color: var(--pure-light); text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .btn-toggle.active { background: var(--pure-light); color: var(--void); }

        /* --- INTERACTIVE WAVEFORM SCRUBBER --- */
        .timeline-container { width: 100%; display: flex; align-items: center; gap: 20px; pointer-events: auto; }
        .time-display { font-size: 0.7rem; letter-spacing: 1px; font-weight: 700; width: 40px; text-align: center; color: rgba(255,255,255,0.5);}
        
        .waveform-wrapper {
            flex-grow: 1; height: 30px; display: flex; align-items: flex-end; gap: 2px;
            cursor: pointer; position: relative; padding-bottom: 5px;
        }

        .wave-bar {
            flex: 1; background-color: var(--ghost); border-radius: 1px;
            transition: background-color 0.1s, height 0.2s ease;
            transform-origin: bottom; pointer-events: none;
        }

        .wave-bar.filled { background-color: var(--pure-light); box-shadow: 0 0 5px rgba(255,255,255,0.4); }
        .waveform-wrapper:hover .wave-bar { opacity: 0.8; }

        /* --- DROPDOWN VOLUME CONTROLLER --- */
        .volume-wrapper { position: relative; display: flex; align-items: center; justify-content: center; width: 40px; height: 30px; }
        .volume-icon { font-size: 0.6rem; font-weight: 700; letter-spacing: 1px; color: rgba(255,255,255,0.5); transition: color 0.2s; cursor: pointer; }
        .volume-wrapper:hover .volume-icon { color: var(--pure-light); text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        
        .volume-dropdown { 
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); 
            width: 30px; height: 100px; background: var(--void); border: 1px solid rgba(255,255,255,0.2); 
            display: flex; align-items: center; justify-content: center; 
            opacity: 0; pointer-events: none; transition: opacity 0.2s, bottom 0.2s; padding: 10px 0; 
        }
        .volume-wrapper:hover .volume-dropdown { opacity: 1; pointer-events: auto; bottom: 40px; }
        
        .vol-track-bg { width: 4px; height: 100%; background: var(--ghost); position: relative; cursor: pointer; }
        .vol-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: var(--pure-light); box-shadow: 0 0 5px var(--pure-light); pointer-events: none; }
        .vol-handle { position: absolute; top: 0; left: 50%; width: 12px; height: 4px; background: #fff; transform: translate(-50%, -50%); pointer-events: none; }

        /* --- DIRECTORY (PLAYLIST) --- */
        .right-cloisters { border-right: none; padding: 60px 50px; justify-content: center; background: linear-gradient(to right, rgba(0,0,0,0), rgba(2,2,2,0.9)); }
        .section-header { font-size: 0.6rem; color: rgba(255, 255, 255, 0.3); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 50px; }
        .directory-list { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--ghost); }

        .dir-node {
            display: grid; grid-template-columns: 40px 1fr; align-items: center;
            padding: 30px 0; border-bottom: 1px solid var(--ghost);
            text-decoration: none; color: rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative;
        }

        .dir-node::before {
            content: '['; position: absolute; left: -15px; opacity: 0;
            font-family: var(--mono-font); color: var(--pure-light); font-size: 0.8rem;
            transition: all 0.3s ease; transform: translateX(10px);
        }

        .dir-node:hover, .dir-node.active-track {
            color: var(--pure-light); padding-left: 15px; 
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.03) 0%, transparent 100%);
        }
        .dir-node:hover::before, .dir-node.active-track::before { opacity: 1; transform: translateX(0); }
        
        .dir-index { font-family: var(--serif-font); font-style: italic; font-size: 1.2rem; transition: color 0.3s; }
        .dir-node:hover .dir-index, .dir-node.active-track .dir-index { color: var(--pure-light); }
        
        .dir-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; transition: letter-spacing 0.4s cubic-bezier(0.16, 1, 0.3, 1), text-shadow 0.3s; text-transform: uppercase; }
        .dir-node:hover .dir-title, .dir-node.active-track .dir-title { letter-spacing: 2px; text-shadow: 0 0 8px rgba(255,255,255,0.3); }
        .dir-spec { font-size: 0.55rem; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }

        @media (max-width: 1024px) {
            .brutalist-grid { grid-template-columns: 1fr; height: auto; }
            .left-axis { display: none; }
            .right-cloisters { height: auto; padding: 40px 20px; background: #000;}
            .center-nave { padding: 40px 20px; }
            body { overflow: auto; cursor: auto;}
            #cursor-wrapper, #lo-fi-grain, #visual-engine { display: none; }
        }
    </style>
</head>
<body>

    <audio id="audio-source" crossorigin="anonymous"></audio>

    <div id="visual-engine">
        <canvas id="visualizer-canvas"></canvas>
    </div>
    
    <canvas id="lo-fi-grain"></canvas>
    
    <div id="cursor-wrapper">
        <div id="geo-cursor">
            <div class="cursor-ring"></div>
            <div class="cursor-ring"></div>
            <div class="cursor-ring"></div>
        </div>
    </div>

    <div class="brutalist-grid">
        <div class="panel left-axis">
            <div class="vertical-marker" style="margin-top: auto; color: rgba(255,255,255,0.3);">0X1900</div>
        </div>

        <div class="panel center-nave">
            <div class="header-block">
                <a href="index.html" class="back-btn interactive">[ ← GO BACK ]</a>
            </div>

            <div class="current-track-display">
                <div class="current-index" id="display-index">00</div>
                <div class="current-title" id="display-title">SELECT TRACK</div>
                <div class="controls-row">
                    <div class="btn-toggle interactive" id="play-btn">PLAY</div>
                    <div class="btn-toggle interactive" id="sync-btn">SYNC PULSE: OFF</div>
                </div>
            </div>

            <div class="timeline-container" id="timeline">
                <div class="time-display" id="current-time">0:00</div>
                
                <div class="waveform-wrapper interactive" id="waveform-bg">
                    </div>
                
                <div class="time-display" id="duration">0:00</div>
                
                <div class="volume-wrapper">
                    <div class="volume-icon interactive">[VOL]</div>
                    <div class="volume-dropdown">
                        <div class="vol-track-bg" id="vol-track">
                            <div class="vol-fill" id="vol-fill"></div>
                            <div class="vol-handle" id="vol-handle"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel right-cloisters">
            <div>
                <div class="section-header">// AUDIO DIRECTORY</div>
                <nav class="directory-list">
                    
                    <div class="dir-node interactive track-select" data-src="song1.mp3" data-vis="1" data-index="01" data-title="DREAMFLASHER">
                        <div class="dir-index">01</div>
                        <div class="dir-content">
                            <div class="dir-title">DREAMFLASHER</div>
                            <div class="dir-spec">Vis 01 // Kinetic Geode</div>
                        </div>
                    </div>
                    
                    <div class="dir-node interactive track-select" data-src="song2.mp3" data-vis="2" data-index="02" data-title="DEMO_ONE">
                        <div class="dir-index">02</div>
                        <div class="dir-content">
                            <div class="dir-title">DEMO_ONE</div>
                            <div class="dir-spec">Vis 02 // Data Monoliths</div>
                        </div>
                    </div>

                    <div class="dir-node interactive track-select" data-src="song3.mp3" data-vis="3" data-index="03" data-title="DEMO_TWO">
                        <div class="dir-index">03</div>
                        <div class="dir-content">
                            <div class="dir-title">DEMO_TWO</div>
                            <div class="dir-spec">Vis 03 // The Tesseract</div>
                        </div>
                    </div>

                </nav>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SUBTLE B&W DUST ENGINE ---
        const grainCanvas = document.getElementById('lo-fi-grain');
        const grainCtx = grainCanvas.getContext('2d', { alpha: false });
        let noiseCacheCanvas = null;
        
        function initNoiseEngine() {
            grainCanvas.width = window.innerWidth; grainCanvas.height = window.innerHeight;
            const idata = grainCtx.createImageData(grainCanvas.width, grainCanvas.height);
            const buffer32 = new Uint32Array(idata.data.buffer);
            for (let i = 0; i < buffer32.length; i++) buffer32[i] = Math.random() < 0.04 ? 0xff000000 : 0xffffffff; 
            noiseCacheCanvas = document.createElement('canvas');
            noiseCacheCanvas.width = grainCanvas.width; noiseCacheCanvas.height = grainCanvas.height;
            noiseCacheCanvas.getContext('2d').putImageData(idata, 0, 0);
        }

        function drawBlitNoise() {
            if (!noiseCacheCanvas) return;
            const jitterX = Math.floor((Math.random() * 30) - 15);
            const jitterY = Math.floor((Math.random() * 30) - 15);
            grainCtx.clearRect(0, 0, grainCanvas.width, grainCanvas.height);
            grainCtx.drawImage(noiseCacheCanvas, jitterX, jitterY);
        }
        window.addEventListener('resize', initNoiseEngine);
        initNoiseEngine(); setInterval(drawBlitNoise, 60); 

        // --- 2. 3D CURSOR PHYSICS ---
        const cursorWrapper = document.getElementById('cursor-wrapper');
        let curX = window.innerWidth / 2, curY = window.innerHeight / 2;
        let tarX = curX, tarY = curY;

        document.addEventListener('mousemove', (e) => { tarX = e.clientX; tarY = e.clientY; });
        document.addEventListener('mousedown', () => cursorWrapper.classList.add('clicking'));
        document.addEventListener('mouseup', () => cursorWrapper.classList.remove('clicking'));

        function renderCursor() {
            curX += (tarX - curX) * 0.25; curY += (tarY - curY) * 0.25;
            cursorWrapper.style.left = curX + 'px'; cursorWrapper.style.top = curY + 'px';
            requestAnimationFrame(renderCursor);
        }
        renderCursor();

        document.querySelectorAll('.interactive').forEach(el => {
            el.addEventListener('mouseenter', () => cursorWrapper.classList.add('hovering'));
            el.addEventListener('mouseleave', () => cursorWrapper.classList.remove('hovering'));
        });

        // --- 3. WAVEFORM GENERATOR ---
        const waveformBg = document.getElementById('waveform-bg');
        const numBars = 80; 
        const bars = [];
        
        for(let i=0; i<numBars; i++) {
            const bar = document.createElement('div');
            bar.classList.add('wave-bar');
            // Generate a random aesthetic sine-like height
            const pseudoHeight = Math.abs(Math.sin(i * 0.2)) * 60 + Math.random() * 40;
            bar.style.height = `${Math.max(10, pseudoHeight)}%`;
            waveformBg.appendChild(bar);
            bars.push(bar);
        }

        // --- 4. AUDIO ENGINE & PULSE LOGIC ---
        const audioEl = document.getElementById('audio-source');
        const visCanvas = document.getElementById('visualizer-canvas');
        const visCtx = visCanvas.getContext('2d');
        
        const displayIndex = document.getElementById('display-index');
        const displayTitle = document.getElementById('display-title');
        const playBtn = document.getElementById('play-btn');
        const syncBtn = document.getElementById('sync-btn');
        const trackNodes = document.querySelectorAll('.track-select');
        
        let audioCtx, analyser, source, decoupleFilter;
        let dataArray, bufferLength;
        let isPlaying = false;
        let audioInitialized = false;
        
        let isDecoupling = false;
        let decoupleIntensity = 0;
        let currentVisMode = 1;
        let animationFrameId = null;

        let pulseEnabled = false;
        let lastPulseTime = 0;

        function resizeCanvas() { visCanvas.width = window.innerWidth; visCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function initWebAudio() {
            if (audioInitialized) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audioEl);
            
            decoupleFilter = audioCtx.createBiquadFilter();
            decoupleFilter.type = 'lowpass'; 
            decoupleFilter.frequency.value = 24000; 

            source.connect(decoupleFilter);
            decoupleFilter.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            analyser.fftSize = 512; 
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            audioInitialized = true;
        }

        function executeDecoupleTransition(src, title, index, visMode, node) {
            initWebAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            trackNodes.forEach(n => n.classList.remove('active-track'));
            node.classList.add('active-track');
            
            isDecoupling = true;
            decoupleIntensity = 1.0; 
            displayTitle.style.opacity = 0; 
            
            decoupleFilter.frequency.setTargetAtTime(300, audioCtx.currentTime, 0.1);

            setTimeout(() => {
                if (!audioEl.src.endsWith(src)) audioEl.src = src;
                audioEl.play().catch(e => console.log("Playback required"));
                
                displayIndex.innerText = index;
                displayTitle.innerText = title;
                currentVisMode = visMode;
                displayTitle.style.opacity = 1; 

                if (!isPlaying) {
                    isPlaying = true;
                    playBtn.classList.add('active');
                    if(animationFrameId) cancelAnimationFrame(animationFrameId);
                    renderVisualizer();
                }
                
                playBtn.innerText = "PAUSE";
                decoupleFilter.frequency.setTargetAtTime(24000, audioCtx.currentTime, 0.1);
            }, 300);

            const decoupleDecay = setInterval(() => {
                decoupleIntensity -= 0.05;
                if(decoupleIntensity <= 0) {
                    decoupleIntensity = 0;
                    isDecoupling = false;
                    clearInterval(decoupleDecay);
                }
            }, 30);
        }

        trackNodes.forEach(node => {
            node.addEventListener('click', () => {
                const src = node.getAttribute('data-src');
                const title = node.getAttribute('data-title');
                const index = node.getAttribute('data-index');
                const visMode = parseInt(node.getAttribute('data-vis'));
                
                if(!isDecoupling) executeDecoupleTransition(src, title, index, visMode, node);
            });
        });

        playBtn.addEventListener('click', () => {
            if (!audioInitialized) return; 
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (isPlaying) {
                audioEl.pause(); 
                isPlaying = false;
                playBtn.innerText = "PLAY";
                playBtn.classList.remove('active');
                if(animationFrameId) cancelAnimationFrame(animationFrameId);
            } else {
                audioEl.play(); 
                isPlaying = true;
                playBtn.innerText = "PAUSE";
                playBtn.classList.add('active');
                if(animationFrameId) cancelAnimationFrame(animationFrameId);
                renderVisualizer();
            }
        });

        syncBtn.addEventListener('click', () => {
            pulseEnabled = !pulseEnabled;
            if (pulseEnabled) {
                syncBtn.innerText = "SYNC PULSE: ON";
                syncBtn.classList.add('active');
            } else {
                syncBtn.innerText = "SYNC PULSE: OFF";
                syncBtn.classList.remove('active');
                document.body.style.backgroundColor = 'var(--void)';
            }
        });

        // --- 5. VISUAL RENDER LOOP (RESTRICTED SIZES) ---
        function renderVisualizer() {
            if (!isPlaying && !isDecoupling) return;
            animationFrameId = requestAnimationFrame(renderVisualizer);

            analyser.getByteFrequencyData(dataArray);
            visCtx.clearRect(0, 0, visCanvas.width, visCanvas.height);

            const uiOffset = window.innerWidth > 1024 ? -185 : 0; 
            const centerX = (visCanvas.width / 2) + uiOffset; 
            const centerY = visCanvas.height / 2;
            
            let bassSum = 0; for(let i = 0; i < 6; i++) bassSum += dataArray[i];
            const bassAvg = bassSum / 6;

            // Restrict bounds so it never scales infinitely off-screen
            const maxRadius = Math.min(window.innerWidth, window.innerHeight) * 0.35;

            // --- KINETIC PULSE LOGIC (Replaces annoying strobes) ---
            if (pulseEnabled) {
                const now = Date.now();
                if (bassAvg > 210 && (now - lastPulseTime > 300)) { 
                    // Subtle monochrome flash mapping to beat
                    document.body.style.backgroundColor = 'rgba(30, 30, 30, 1)';
                    lastPulseTime = now;
                    setTimeout(() => { document.body.style.backgroundColor = 'var(--void)'; }, 100);
                }
            }

            if (isDecoupling) {
                visCtx.setLineDash([2, 15 + (decoupleIntensity * 30)]);
                visCtx.strokeStyle = `rgba(255, 255, 255, ${1 - decoupleIntensity})`;
            } else {
                visCtx.setLineDash([]);
                visCtx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            }
            visCtx.lineWidth = 1.5;

            // --- VIS 1: KINETIC GEODE ---
            if (currentVisMode === 1) {
                const nodes = [];
                const numNodes = 80;
                const phi = Math.PI * (3 - Math.sqrt(5)); 
                const baseRadius = 180 + (bassAvg * 0.4);
                const radius = Math.min(baseRadius, maxRadius); // Boundary check
                const time = Date.now() * 0.0005;

                for (let i = 0; i < numNodes; i++) {
                    const y = 1 - (i / (numNodes - 1)) * 2; 
                    const r = Math.sqrt(1 - y * y); 
                    const theta = phi * i; 

                    let x = Math.cos(theta) * r;
                    let z = Math.sin(theta) * r;

                    const freqVal = dataArray[(i * 3) % bufferLength] / 255;
                    const push = 1 + (freqVal * 0.8);
                    
                    x *= push;
                    let yPush = y * push;
                    z *= push;

                    const rx = x * Math.cos(time) - z * Math.sin(time);
                    const rz = x * Math.sin(time) + z * Math.cos(time);
                    const ry = yPush * Math.cos(time*0.7) - rz * Math.sin(time*0.7);

                    const decoupleZ = rz + (decoupleIntensity * (i % 2 === 0 ? 300 : -300));
                    const scale = 600 / (600 + decoupleZ);

                    const jX = (Math.random() - 0.5) * (decoupleIntensity * 150);
                    const jY = (Math.random() - 0.5) * (decoupleIntensity * 150);

                    nodes.push({ x: centerX + rx * radius * scale + jX, y: centerY + ry * radius * scale + jY });
                }

                visCtx.strokeStyle = `rgba(255, 255, 255, ${isDecoupling ? (1 - decoupleIntensity) : 0.3})`;
                visCtx.beginPath();
                for (let i = 0; i < numNodes; i++) {
                    for (let j = i + 1; j < numNodes; j++) {
                        const dx = nodes[i].x - nodes[j].x;
                        const dy = nodes[i].y - nodes[j].y;
                        if (Math.sqrt(dx*dx + dy*dy) < 80 * (1 + bassAvg/255)) { 
                            visCtx.moveTo(nodes[i].x, nodes[i].y);
                            visCtx.lineTo(nodes[j].x, nodes[j].y);
                        }
                    }
                }
                visCtx.stroke();
                
                visCtx.fillStyle = `rgba(255, 255, 255, ${1 - decoupleIntensity})`;
                nodes.forEach(n => {
                    visCtx.beginPath(); visCtx.arc(n.x, n.y, 2, 0, Math.PI*2); visCtx.fill();
                });
            }

            // --- VIS 2: DATA MONOLITHS ---
            else if (currentVisMode === 2) {
                const numPillars = 40;
                const baseRadius = 220 + (bassAvg * 0.3) + (decoupleIntensity * 150);
                const radius = Math.min(baseRadius, maxRadius * 1.2); 
                const time = Date.now() * 0.0005;

                for(let i = 0; i < numPillars; i++) {
                    const val = dataArray[i * 2] / 255; 
                    const heightRaw = 10 + Math.pow(val, 2) * 200;
                    const height = Math.min(heightRaw, maxRadius * 1.5); // Cap vertical height
                    const angle = (i / numPillars) * Math.PI * 2 + time;
                    
                    const x3d = Math.cos(angle) * radius;
                    const z3d = Math.sin(angle) * radius;
                    const scale = 500 / (500 + z3d);
                    
                    const jX = (Math.random() - 0.5) * (decoupleIntensity * 150);
                    const jY = (Math.random() - 0.5) * (decoupleIntensity * 150);

                    const x = centerX + (x3d * scale) + jX;
                    const y = centerY + 100 + jY; 

                    visCtx.beginPath();
                    visCtx.strokeStyle = `rgba(255,255,255,${(0.1 + (val * 0.8)) * (1 - decoupleIntensity)})`;
                    visCtx.moveTo(x, y); visCtx.lineTo(x, y - (height * scale)); visCtx.stroke();
                    
                    visCtx.beginPath();
                    visCtx.fillStyle = `rgba(255,255,255,${1 - decoupleIntensity})`;
                    visCtx.arc(x, y - (height * scale), 2 * scale, 0, Math.PI*2); visCtx.fill();
                }
            }

            // --- VIS 3: THE TESSERACT ---
            else if (currentVisMode === 3) {
                const time = Date.now() * 0.0005;
                const baseSize = 160 + (bassAvg * 0.2); 
                const size = Math.min(baseSize, maxRadius); // Boundary check
                
                const nodes = [];
                for(let i=0; i<8; i++) {
                    let x = (i & 1 ? 1 : -1); let y = (i & 2 ? 1 : -1); let z = (i & 4 ? 1 : -1);
                    const freqVal = dataArray[10 + (i * 5)] / 255;
                    const push = 1 + (freqVal * 0.6);
                    x *= push; y *= push; z *= push;

                    const rx = x * Math.cos(time) - z * Math.sin(time);
                    const rz = x * Math.sin(time) + z * Math.cos(time);
                    const ry = y * Math.cos(time*0.7) - rz * Math.sin(time*0.7);
                    
                    const decoupleZ = rz + (decoupleIntensity * (i % 2 === 0 ? 500 : -500));
                    const scale = 600 / (600 + decoupleZ);
                    
                    const jX = (Math.random() - 0.5) * (decoupleIntensity * 200);
                    const jY = (Math.random() - 0.5) * (decoupleIntensity * 200);

                    nodes.push({ x: centerX + rx * size * scale + jX, y: centerY + ry * size * scale + jY });
                }

                visCtx.beginPath();
                const edges = [[0,1], [1,3], [3,2], [2,0], [4,5], [5,7], [7,6], [6,4], [0,4], [1,5], [2,6], [3,7]];
                edges.forEach(edge => { 
                    const n1 = nodes[edge[0]]; const n2 = nodes[edge[1]];
                    visCtx.moveTo(n1.x, n1.y); visCtx.lineTo(n2.x, n2.y); 
                });
                visCtx.stroke();
            }
            visCtx.setLineDash([]);
        }

        // --- 6. ADVANCED SCRUBBER & VOLUME UI FIXES ---
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        
        const volTrack = document.getElementById('vol-track');
        const volFill = document.getElementById('vol-fill');
        const volHandle = document.getElementById('vol-handle');

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60), secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        audioEl.addEventListener('loadedmetadata', () => { durationEl.innerText = formatTime(audioEl.duration); });
        
        // Scrubbing State
        let isScrubbing = false;
        
        waveformBg.addEventListener('mousedown', (e) => { isScrubbing = true; scrubTimeline(e); });
        window.addEventListener('mousemove', (e) => { if(isScrubbing) scrubTimeline(e); });
        window.addEventListener('mouseup', () => { isScrubbing = false; });

        function scrubTimeline(e) {
            if (!audioEl.src || isDecoupling) return; 
            const rect = waveformBg.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent));
            
            audioEl.currentTime = percent * audioEl.duration;
            currentTimeEl.innerText = formatTime(audioEl.currentTime);
            updateWaveformUI(percent);
        }

        function updateWaveformUI(percent) {
            const activeBars = Math.floor(percent * numBars);
            bars.forEach((bar, index) => {
                if(index <= activeBars) bar.classList.add('filled');
                else bar.classList.remove('filled');
            });
        }

        function syncTimelineLoop() {
            if(isPlaying && !isDecoupling && !isScrubbing) {
                const percent = (audioEl.currentTime / audioEl.duration);
                currentTimeEl.innerText = formatTime(audioEl.currentTime);
                updateWaveformUI(percent);
            }
            requestAnimationFrame(syncTimelineLoop);
        }
        syncTimelineLoop();

        audioEl.addEventListener('ended', () => {
            isPlaying = false; playBtn.innerText = "PLAY"; playBtn.classList.remove('active');
            updateWaveformUI(0); visCtx.clearRect(0, 0, visCanvas.width, visCanvas.height);
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
        });

        // Fixed Volume Logic
        let isVolDragging = false;
        
        // Initialize volume visually to max
        audioEl.volume = 1;
        
        volTrack.addEventListener('mousedown', (e) => { isVolDragging = true; scrubVolume(e); });
        window.addEventListener('mousemove', (e) => { if(isVolDragging) scrubVolume(e); });
        window.addEventListener('mouseup', () => { isVolDragging = false; });

        function scrubVolume(e) {
            const rect = volTrack.getBoundingClientRect();
            let percent = 1 - ((e.clientY - rect.top) / rect.height);
            percent = Math.max(0, Math.min(1, percent));
            
            audioEl.volume = percent;
            volFill.style.height = `${percent * 100}%`;
            volHandle.style.top = `${(1 - percent) * 100}%`;
        }

    </script>
</body>
