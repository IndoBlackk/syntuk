<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNT_NODE_91</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        :root {
            --bg-void: #020104;
            --os-window: #110d14;
            --border-light: #382b42;
            --border-dark: #070509;
            --text-main: #bdaebf;
            --text-dim: #6e5e70;
            --accent-blood: #6b0512;
            --accent-gold: #8f793b;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100vh; overflow: hidden;
            font-family: 'VT323', monospace;
            user-select: none;
        }

        /* CRT Effects */
        #monitor {
            position: relative; width: 100vw; height: 100vh;
            background-color: var(--bg-void); overflow: hidden;
        }
        #monitor::after {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.3));
            background-size: 100% 4px; pointer-events: none; z-index: 9999;
        }
        #monitor::before {
            content: " "; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.8) 100%);
            pointer-events: none; z-index: 9998;
        }

        /* Professional / Dark Web Boot Screen */
        #boot-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; color: #a1a1a1;
            padding: 30px; box-sizing: border-box; z-index: 1000;
            font-size: 1.4rem; letter-spacing: 1px;
        }
        #terminal-output { white-space: pre-wrap; line-height: 1.4; }
        .blink { animation: blinker 1s step-start infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* Maximalist Desktop Environment */
        #desktop {
            display: none; width: 100%; height: calc(100% - 40px); position: relative;
            /* Corrupted, repeating dark texture */
            background-color: #050308;
            background-image: 
                radial-gradient(var(--border-dark) 1px, transparent 1px),
                radial-gradient(var(--border-dark) 1px, transparent 1px);
            background-size: 20px 20px; background-position: 0 0, 10px 10px;
        }

        /* Desktop Icons - 90s Blocky OS Style */
        .icon-grid {
            display: flex; flex-direction: column; gap: 40px; padding: 30px; width: 150px;
        }
        .desktop-icon {
            display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer;
        }
        .icon-graphic {
            width: 48px; height: 48px;
            background: var(--os-window);
            border-top: 3px solid var(--border-light);
            border-left: 3px solid var(--border-light);
            border-bottom: 3px solid var(--border-dark);
            border-right: 3px solid var(--border-dark);
            box-shadow: 4px 4px 0 rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 10px; font-family: 'Press Start 2P', cursive; font-size: 1.5rem; color: var(--accent-gold);
            transition: all 0.1s;
        }
        .desktop-icon:active .icon-graphic {
            border-top: 3px solid var(--border-dark); border-left: 3px solid var(--border-dark);
            border-bottom: 3px solid var(--border-light); border-right: 3px solid var(--border-light);
        }
        .icon-text {
            font-family: 'Press Start 2P', cursive; font-size: 0.6rem; color: var(--text-main);
            background-color: rgba(0,0,0,0.5); padding: 4px;
        }

        /* 90s Taskbar with extra functionality */
        #taskbar {
            display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: 40px;
            background-color: #1a1622;
            border-top: 3px solid var(--border-light);
            display: flex; align-items: center; justify-content: space-between; padding: 0 10px; box-sizing: border-box; z-index: 500;
        }
        .start-btn {
            font-family: 'Press Start 2P', cursive; background-color: var(--os-window);
            border-top: 2px solid var(--border-light); border-left: 2px solid var(--border-light);
            border-bottom: 2px solid var(--border-dark); border-right: 2px solid var(--border-dark);
            padding: 8px 15px; font-size: 0.7rem; color: var(--text-main); cursor: crosshair; font-weight: bold;
        }
        .taskbar-widgets { display: flex; gap: 15px; align-items: center; }
        .widget-box {
            font-size: 1.1rem; border: 2px inset var(--border-dark);
            padding: 5px 15px; background-color: #000; color: var(--accent-gold);
        }
        #ping-tracker { color: var(--accent-blood); }

        /* Draggable Window */
        .window {
            display: none; position: absolute; top: 15%; left: 30%; width: 500px;
            background-color: var(--os-window);
            border-top: 3px solid var(--border-light); border-left: 3px solid var(--border-light);
            border-bottom: 3px solid var(--border-dark); border-right: 3px solid var(--border-dark);
            box-shadow: 10px 10px 0 rgba(0,0,0,0.9); z-index: 100;
        }
        .title-bar {
            background: linear-gradient(90deg, #1f1f1f, #0a0a0a);
            padding: 8px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--border-dark); cursor: grab;
        }
        .title-text { font-family: 'Press Start 2P', cursive; font-size: 0.6rem; color: var(--text-dim); }
        .close-btn {
            background-color: var(--accent-blood); border: 2px outset #ff4d4d;
            width: 20px; height: 20px; cursor: pointer;
        }
        .close-btn:active { border-style: inset; }
        
        .window-content {
            padding: 25px; font-size: 1.4rem; color: var(--text-main);
            background-color: #0b080f; margin: 5px; border: 2px inset var(--border-dark);
        }

        /* Riddle Specifics */
        .riddle-text { color: var(--accent-gold); margin-bottom: 20px; font-style: italic; }
        .riddle-input {
            width: 100%; background: #000; color: #fff; border: 2px inset var(--border-light);
            padding: 10px; font-family: 'VT323', monospace; font-size: 1.5rem; outline: none; box-sizing: border-box; text-transform: uppercase;
        }
        #riddle-response { color: var(--accent-blood); margin-top: 15px; font-weight: bold; }
        
        .hidden-content { display: none; margin-top: 20px; color: var(--text-main); border-top: 1px dashed var(--text-dim); padding-top: 15px;}
    </style>
</head>
<body>

<div id="monitor">
    
    <div id="boot-screen">
        <div id="terminal-output"></div>
        <span class="blink" style="display:inline-block; margin-top: 10px;">█</span>
    </div>

    <div id="desktop">
        
        <div class="icon-grid">
            <div class="desktop-icon" onclick="openWindow('GATEWAY_PROTOCOL.exe', 'riddle')">
                <div class="icon-graphic">♆</div>
                <div class="icon-text">GATEWAY.exe</div>
            </div>

            <div class="desktop-icon" onclick="openWindow('ARCHIVE_NODE.sys', 'text')">
                <div class="icon-graphic">🖿</div>
                <div class="icon-text">ARCHIVES.sys</div>
            </div>
        </div>

        <div id="os-window" class="window">
            <div class="title-bar" id="window-header">
                <div class="title-text" id="window-title">WINDOW_NAME</div>
                <div class="close-btn" onclick="closeWindow()"></div>
            </div>
            <div class="window-content" id="window-body">
                </div>
        </div>
    </div>

    <div id="taskbar">
        <div class="start-btn">SYNT_SYS</div>
        <div class="taskbar-widgets">
            <div class="widget-box" id="ping-tracker">PING: 24ms</div>
            <div class="widget-box" id="os-clock">00:00</div>
        </div>
    </div>

</div>

<script>
    // ==========================================
    // PROFESSIONAL TERMINAL BOOT SEQUENCE
    // ==========================================
    const bootLines = [
        "SYNT MAINFRAME TERMINAL [VERSION 3.1.91]",
        "ESTABLISHING SECURE CONNECTION...",
        "NODE RESOLVED: UNKNOWN DOMAIN",
        "",
        "HANDSHAKE PROTOCOL INITIATED...",
        "WARNING: ENCRYPTION LAYER EXCEEDS STANDARD PARAMETERS",
        "DECRYPTING CATACOMBS...",
        "ACCESS GRANTED.",
        "",
        "LOADING DESKTOP ENVIRONMENT..."
    ];

    const terminal = document.getElementById('terminal-output');
    let lineIndex = 0;

    function typeBootLines() {
        if (lineIndex < bootLines.length) {
            terminal.innerHTML += bootLines[lineIndex] + "<br>";
            lineIndex++;
            let delay = Math.random() * 200 + 50; 
            if (lineIndex === 2 || lineIndex === 6) delay = 900; // Artificial lag
            setTimeout(typeBootLines, delay);
        } else {
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('desktop').style.display = 'block';
                document.getElementById('taskbar').style.display = 'flex';
                updateClock();
                updatePing();
            }, 800);
        }
    }
    window.onload = () => { setTimeout(typeBootLines, 500); };

    // ==========================================
    // TASKBAR WIDGETS
    // ==========================================
    function updateClock() {
        const now = new Date();
        let hours = now.getHours().toString().padStart(2, '0');
        let minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('os-clock').innerText = `${hours}:${minutes}`;
        setTimeout(updateClock, 1000);
    }

    function updatePing() {
        // Simulates an erratic, dark-web network ping
        const ping = Math.floor(Math.random() * 150) + 12;
        document.getElementById('ping-tracker').innerText = `NODE: ${ping}ms`;
        setTimeout(updatePing, Math.random() * 3000 + 1000);
    }

    // ==========================================
    // WINDOW & RIDDLE LOGIC
    // ==========================================
    const win = document.getElementById('os-window');
    const winTitle = document.getElementById('window-title');
    const winBody = document.getElementById('window-body');

    function openWindow(title, type) {
        winTitle.innerText = title;
        
        if (type === 'riddle') {
            winBody.innerHTML = `
                <div class="riddle-text">
                    "I am the frozen lake at the very bottom of the abyss. The treacherous are locked within my ice, kept cold by the beating wings of the three-faced king. Speak my name to proceed."
                </div>
                <input type="text" id="riddle-answer" class="riddle-input" placeholder="ENTER SOLUTION..." onkeypress="checkRiddle(event)">
                <div id="riddle-response"></div>
                <div id="secret-content" class="hidden-content">
                    CONNECTION SECURED.<br><br>
                    Welcome to the Synt hidden directory. You have bypassed the outer rings. The architecture here is unstable. Proceed with caution.
                </div>
            `;
        } else if (type === 'text') {
            winBody.innerHTML = `ERROR 0x0091: ARCHIVE CORRUPTED.<br><br>Most files were purged during the '94 server collapse. Only fragments of the old gothic framework remain.`;
        }

        win.style.display = 'block';
    }

    function closeWindow() { win.style.display = 'none'; }

    function checkRiddle(event) {
        if (event.key === 'Enter') {
            const input = document.getElementById('riddle-answer').value.toLowerCase().trim();
            const responseDiv = document.getElementById('riddle-response');
            
            // The answer to the Dante's Inferno 9th Circle riddle is Cocytus
            if (input === "cocytus") {
                responseDiv.style.color = "#8f793b"; // Turn gold
                responseDiv.innerText = "ACCESS GRANTED.";
                document.getElementById('riddle-answer').disabled = true;
                document.getElementById('secret-content').style.display = "block";
            } else {
                responseDiv.innerText = "ACCESS DENIED. THE ICE REMAINS UNBROKEN.";
                document.getElementById('riddle-answer').value = '';
            }
        }
    }

    // Draggable Window Logic
    const header = document.getElementById('window-header');
    let isDragging = false, xOffset = 0, yOffset = 0, initialX, initialY;

    header.addEventListener('mousedown', dragStart);
    document.addEventListener('mouseup', dragEnd);
    document.addEventListener('mousemove', drag);

    function dragStart(e) {
        initialX = e.clientX - xOffset;
        initialY = e.clientY - yOffset;
        if (e.target === header || e.target === winTitle) { isDragging = true; }
    }
    function dragEnd() { initialX = xOffset; initialY = yOffset; isDragging = false; }
    function drag(e) {
        if (isDragging) {
            e.preventDefault();
            xOffset = e.clientX - initialX;
            yOffset = e.clientY - initialY;
            win.style.transform = `translate3d(${xOffset}px, ${yOffset}px, 0)`;
        }
    }
</script>

</body>
</html>
