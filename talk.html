<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNT // ETHEREAL RELAY [ONLINE]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Space+Mono:wght@400&display=swap');

        :root {
            --void: #020202; --ash: #ececec; --pure-light: #ffffff;
            --ghost: rgba(255, 255, 255, 0.04);
            --mono-font: 'Space Mono', monospace; --serif-font: 'Cormorant Garamond', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }

        body {
            background-color: var(--void); color: var(--ash);
            font-family: var(--mono-font); overflow: hidden; height: 100vh; width: 100vw;
        }

        #lo-fi-grain { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.035; mix-blend-mode: overlay; }
        #void-dust { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; opacity: 0.85; }

        /* --- ABORT BUTTON --- */
        .lobby-back {
            position: absolute; top: 40px; left: 40px; font-family: var(--mono-font);
            font-size: 0.6rem; color: rgba(255,255,255,0.3); letter-spacing: 4px;
            text-decoration: none; text-transform: uppercase; transition: color 0.3s; z-index: 5001;
        }
        .lobby-back:hover { color: var(--pure-light); }

        /* --- INITIATION PROTOCOL --- */
        #initiation-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(2, 2, 2, 0.85); backdrop-filter: blur(20px); z-index: 5000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 2s cubic-bezier(0.16, 1, 0.3, 1), transform 2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #initiation-layer.dissolve { opacity: 0; pointer-events: none; transform: scale(1.05); }

        .init-title { font-family: var(--serif-font); font-style: italic; font-size: 3rem; color: var(--pure-light); margin-bottom: 50px; letter-spacing: 2px; animation: pulse-glow 4s infinite alternate; }
        @keyframes pulse-glow { 0% { text-shadow: 0 0 10px rgba(255,255,255,0.1); } 100% { text-shadow: 0 0 30px rgba(255,255,255,0.4); } }

        .init-label { font-size: 0.55rem; color: rgba(255, 255, 255, 0.3); letter-spacing: 6px; text-transform: uppercase; margin-bottom: 20px; }

        .avatar-carousel {
            display: flex; gap: 30px; width: 800px; max-width: 90vw; overflow-x: auto; padding: 20px 60px; margin-bottom: 60px; scrollbar-width: none;
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
        }
        .avatar-carousel::-webkit-scrollbar { display: none; }
        
        .avatar-node { flex: 0 0 auto; width: 50px; height: 50px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; opacity: 0.3; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .avatar-node svg { width: 22px; height: 22px; stroke: var(--pure-light); stroke-width: 1.2; fill: none; transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1); }
        .avatar-node:hover { opacity: 1; border-color: rgba(255,255,255,0.4); }
        .avatar-node:hover svg { transform: scale(1.3); }
        .avatar-node.selected { opacity: 1; border-color: var(--pure-light); background: rgba(255,255,255,0.05); box-shadow: 0 0 20px rgba(255,255,255,0.15); }
        .avatar-node.selected svg { transform: scale(1.2); stroke-width: 1.8; }

        .identity-input-wrapper { position: relative; width: 300px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        .identity-input-wrapper:focus-within { border-color: var(--pure-light); }
        #identity-input { background: transparent; border: none; outline: none; color: var(--pure-light); font-family: var(--mono-font); font-size: 1rem; width: 100%; text-align: center; letter-spacing: 2px; text-transform: uppercase; }
        #identity-input::placeholder { color: rgba(255,255,255,0.1); }

        .system-msg { margin-top: 30px; font-size: 0.6rem; color: var(--pure-light); letter-spacing: 4px; text-transform: uppercase; opacity: 0; transition: opacity 0.3s, color 0.3s; }
        
        .system-msg.error { color: #ff3333; animation: glitch-text 0.1s infinite; text-shadow: 0 0 10px #ff3333; }
        @keyframes glitch-text {
            0% { transform: translate(0); } 20% { transform: translate(-2px, 1px); }
            40% { transform: translate(-1px, -1px); } 60% { transform: translate(2px, 1px); }
            80% { transform: translate(1px, -1px); } 100% { transform: translate(0); }
        }

        /* --- CURSOR --- */
        #cursor-core { position: fixed; top: 0; left: 0; color: var(--pure-light); font-family: var(--mono-font); font-size: 14px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10000; text-shadow: 0 0 8px var(--pure-light); }
        #cursor-trail { position: fixed; top: 0; left: 0; width: 35px; height: 35px; border: 1px solid rgba(255, 255, 255, 0.25); transform: translate(-50%, -50%); pointer-events: none; z-index: 9998; transition: width 0.3s, height 0.3s; display: flex; justify-content: space-between; align-items: center; }
        #cursor-trail::before, #cursor-trail::after { content: ''; height: 40%; width: 2px; background: var(--pure-light); box-shadow: 0 0 10px var(--pure-light); }

        /* --- CHAT GRID & PHYSICS --- */
        #ethereal-wave { position: fixed; bottom: 0; left: 0; width: 100vw; height: 35vh; z-index: 1; pointer-events: none; opacity: 0; transition: opacity 3s ease 1s; }
        #ethereal-wave.active { opacity: 0.5; }

        .brutalist-grid { display: grid; grid-template-columns: 80px 1fr; height: 100vh; width: 100vw; position: relative; z-index: 10; opacity: 0; transition: opacity 3s ease 0.5s; }
        .brutalist-grid.active { opacity: 1; }

        .left-axis { border-right: 1px solid var(--ghost); display: flex; flex-direction: column; justify-content: space-between; padding: 40px 0; align-items: center; }
        .sigil { font-family: var(--serif-font); font-style: italic; font-size: 1.8rem; color: rgba(255,255,255,0.3); text-decoration: none; transition: all 1s ease; }
        .sigil:hover { color: #ff3333; text-shadow: 0 0 15px #ff3333; }
        .vertical-marker { transform: rotate(-90deg); white-space: nowrap; font-size: 0.55rem; color: rgba(255, 255, 255, 0.15); letter-spacing: 8px; text-transform: uppercase;}

        .void-nave { display: flex; flex-direction: column; justify-content: flex-start; padding: 10vh 15vw 15vh 15vw; position: relative; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%); mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%); }
        .void-nave::-webkit-scrollbar { display: none; }
        .message-stream { display: flex; flex-direction: column; gap: 60px; padding-bottom: 80px; width: 100%; min-height: 100%; justify-content: flex-end;}

        .tx-wrapper { opacity: 0; filter: blur(15px); transform: translateY(60px) scale(0.95); animation: emerge 4.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; transition: opacity 8s ease, filter 8s ease; }
        .tx-physics-body { display: flex; flex-direction: column; gap: 12px; transform-origin: center left; }
        @keyframes emerge { to { opacity: 1; filter: blur(0px); transform: translateY(0) scale(1); } }
        @keyframes liquid-drift { 0% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-12px) rotate(1.2deg); } 100% { transform: translateY(0px) rotate(0deg); } }

        .tx-header { display: flex; align-items: center; gap: 15px; }
        .tx-avatar-display svg { width: 18px; height: 18px; stroke: var(--pure-light); stroke-width: 1.2; fill: none; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        .tx-meta { font-size: 0.6rem; color: rgba(255, 255, 255, 0.3); letter-spacing: 4px; text-transform: uppercase; font-family: var(--mono-font); }
        .tx-meta .tx-name { color: var(--pure-light); margin-right: 10px; font-weight: bold; }
        .tx-content-container { font-family: var(--serif-font); font-style: italic; font-size: 2.6rem; font-weight: 300; line-height: 1.1; color: var(--ash); max-width: 850px; }
        .tx-char { display: inline-block; will-change: transform, color, text-shadow; transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), color 0.6s, text-shadow 0.6s; }

        /* --- GENERATIVE INPUT MEMBRANE --- */
        .input-membrane { position: absolute; bottom: 40px; left: 15vw; right: 15vw; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; transition: border-color 0.8s ease; cursor: none; z-index: 100;}
        .input-membrane:focus-within { border-color: rgba(255,255,255,0.3); }

        #live-identity-badge { display: none; align-items: center; gap: 15px; margin-right: 20px; padding-right: 20px; border-right: 1px solid rgba(255,255,255,0.1); opacity: 0.5; transition: opacity 0.3s; }
        .input-membrane:focus-within #live-identity-badge { opacity: 1; }
        #live-avatar-slot svg { width: 18px; height: 18px; stroke: var(--pure-light); stroke-width: 1.2; fill: none; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        #live-name-slot { font-size: 0.6rem; color: var(--pure-light); letter-spacing: 2px; text-transform: uppercase; }

        #hidden-void-input { position: absolute; opacity: 0; pointer-events: none; }
        #custom-input-display { font-family: var(--serif-font); font-style: italic; font-size: 1.6rem; color: var(--pure-light); letter-spacing: 1px; display: flex; flex-wrap: wrap; flex-grow: 1; }
        .input-placeholder { color: rgba(255,255,255,0.08); font-family: var(--serif-font); font-style: italic; font-size: 1.6rem; position: absolute; pointer-events: none; transition: opacity 0.3s; }
        .type-char { display: inline-block; }
        .type-char.fade-in { animation: structural-snap 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes structural-snap { 0% { opacity: 0; filter: blur(4px); transform: translateY(5px) scale(0.9); } 100% { opacity: 1; filter: blur(0px); transform: translateY(0) scale(1); } }
        .blinking-cursor { display: inline-block; width: 8px; height: 2px; background-color: var(--pure-light); margin-left: 4px; margin-top: auto; margin-bottom: 4px; animation: blink 1s infinite steps(2); box-shadow: 0 0 5px var(--pure-light); }
        @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* --- SECRETS: ADMIN GATES --- */
        #admin-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(2, 2, 2, 0.95); backdrop-filter: blur(30px); z-index: 6000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.5s;
        }

        .gate-title {
            font-family: var(--serif-font); font-style: italic; font-size: 2.5rem;
            color: rgba(255,255,255,0.5); letter-spacing: 2px; margin-bottom: 40px;
        }

        #gate-key-input {
            background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #ff3333; font-family: var(--mono-font); font-size: 1.2rem; width: 200px;
            text-align: center; letter-spacing: 10px; outline: none; transition: border-color 0.3s;
        }
        #gate-key-input:focus { border-color: #ff3333; text-shadow: 0 0 10px #ff3333; }

        #admin-controls {
            display: none; flex-direction: column; gap: 20px; text-align: center;
        }

        .admin-btn {
            font-family: var(--mono-font); font-size: 0.8rem; color: var(--pure-light);
            letter-spacing: 4px; border: 1px solid rgba(255,255,255,0.2); padding: 15px 30px;
            transition: all 0.3s; text-transform: uppercase;
        }
        .admin-btn:hover { background: var(--pure-light); color: var(--void); box-shadow: 0 0 20px rgba(255,255,255,0.5); }
        
        .admin-btn.danger:hover { background: #ff3333; border-color: #ff3333; box-shadow: 0 0 20px #ff3333; }

    </style>
</head>

        geometricForms.forEach(svgStr => {

            div.className = 'avatar-node'; div.innerHTML = svgStr; div.setAttribute('data-svg', svgStr);

        });

        // --- GLOBAL STATE & LOCAL STORAGE (PERSISTENCE) ---
        let activeAvatarSVG = ''; let activeUserName = '';
        const initLayer = document.getElementById('initiation-layer');
        const avatarNodes = document.querySelectorAll('.avatar-node');
        const idInput = document.getElementById('identity-input');
        const initMsg = document.getElementById('init-msg');
        let isSystemAwake = false;

        // Auto-select avatar if stored in browser
        const storedAvatar = localStorage.getItem('synt_avatar');
        if (storedAvatar) {
            activeAvatarSVG = storedAvatar;
            // Visual feedback for stored avatar
            const nodeToSelect = Array.from(avatarNodes).find(n => n.getAttribute('data-svg') === storedAvatar);
            if(nodeToSelect) nodeToSelect.classList.add('selected');
        }

        // Auto-fill username if stored
        const storedName = localStorage.getItem('synt_identity');
        if (storedName) {
            idInput.value = storedName;
        }

        avatarNodes.forEach(node => {
            node.addEventListener('click', () => {
                avatarNodes.forEach(n => n.classList.remove('selected'));
                node.classList.add('selected'); activeAvatarSVG = node.getAttribute('data-svg'); checkInitStatus();
            });
        });

        idInput.addEventListener('input', () => { initMsg.classList.remove('error'); checkInitStatus(); });

        function checkInitStatus() {
            if (activeAvatarSVG !== '' && idInput.value.trim().length > 0) {
                initMsg.innerText = "[ PRESS ENTER TO WAKE SYSTEM ]"; initMsg.style.opacity = '1';
            } else { initMsg.style.opacity = '0'; }
        }
        checkInitStatus(); // Run on load in case localStorage filled it

        // DATABASE: IDENTITY CHECK & SESSION PERSISTENCE
        idInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && activeAvatarSVG !== '' && idInput.value.trim().length > 0) {
                const requestedName = idInput.value.trim().toUpperCase();
                const userRef = ref(db, `users/${requestedName}`);
                
                get(userRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        // Check if the current browser OWNS this name
                        if (localStorage.getItem('synt_identity') === requestedName) {
                            activeUserName = requestedName;
                            localStorage.setItem('synt_avatar', activeAvatarSVG); // Update avatar if they changed it
                            wakeSystem();
                        } else {
                            // Taken by someone else
                            initMsg.innerText = "[ IDENTITY TAKEN ]";
                            initMsg.classList.add('error');
                        }
                    } else {
                        // Name is completely free - Register it and bind to this browser
                        set(userRef, { active: true, joined: Date.now() });
                        localStorage.setItem('synt_identity', requestedName);
                        localStorage.setItem('synt_avatar', activeAvatarSVG);
                        activeUserName = requestedName;
                        wakeSystem();
                    }
                }).catch((error) => console.error("DB Error:", error));
            }
        });

        function wakeSystem() {
            isSystemAwake = true; initAudioSystemWake();
            initLayer.classList.add('dissolve');
            setTimeout(() => { initLayer.style.display = 'none'; }, 2000);

            document.getElementById('live-identity-badge').style.display = 'flex';
            document.getElementById('live-avatar-slot').innerHTML = activeAvatarSVG;
            document.getElementById('live-name-slot').innerText = activeUserName;
            document.getElementById('placeholder-text').style.left = 'auto';
            document.getElementById('placeholder-text').style.position = 'relative';

            document.getElementById('ethereal-wave').classList.add('active');
            document.getElementById('main-interface').classList.add('active');

            const hiddenInput = document.getElementById('hidden-void-input');
            hiddenInput.disabled = false;
            setTimeout(() => { hiddenInput.focus(); }, 1500);
            
            listenForMessages(); 
        }

        // --- DATABASE: MESSAGE SENDING, RECEIVING & LIVE PURGING ---
        const stream = document.getElementById('stream');
        const chatScroller = document.getElementById('chat-scroller');
        const messagesRef = ref(db, 'messages');

        function listenForMessages() {
            onChildAdded(messagesRef, (data) => {
                const msg = data.val();
                renderMessageToDOM(msg.text, msg.name, msg.avatar, msg.timestamp);
            });

            // Listen for Admin Purge (If database is emptied, clear the screen)
            onValue(messagesRef, (snapshot) => {
                if (!snapshot.exists()) {
                    stream.innerHTML = '';
                }
            });
        }

        function renderMessageToDOM(text, name, avatar, timestamp) {
            const date = new Date(timestamp), timeStr = `[ ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')} ]`;
            const splitText = text.split('').map(char => char === ' ' ? '&nbsp;' : `<span class="tx-char">${char}</span>`).join('');
            const msgBlock = document.createElement('div'); msgBlock.className = 'tx-wrapper'; 
            msgBlock.innerHTML = `<div class="tx-physics-body" style="animation: liquid-drift ${12 + Math.random() * 8}s ease-in-out ${Math.random() * -15}s infinite alternate;"><div class="tx-header"><div class="tx-avatar-display">${avatar}</div><div class="tx-meta"><span class="tx-name">${name}</span> // ${timeStr}</div></div><div class="tx-content-container">${splitText}</div></div>`;
            stream.appendChild(msgBlock);
            if (isSystemAwake) playEtherealChime();
            chatScroller.scrollTo({ top: chatScroller.scrollHeight, behavior: 'smooth' });
        }

        const hiddenInput = document.getElementById('hidden-void-input'), displayDiv = document.getElementById('custom-input-display'), placeholder = document.getElementById('placeholder-text'), membrane = document.getElementById('membrane-container');
        let lastInputVal = "";

        membrane.addEventListener('click', () => { if(!hiddenInput.disabled) hiddenInput.focus(); });
        hiddenInput.addEventListener('input', (e) => {
            const val = e.target.value; placeholder.style.opacity = val.length > 0 ? '0' : '1'; displayDiv.innerHTML = '';
            for(let i=0; i<val.length; i++) { const char = val[i] === ' ' ? '&nbsp;' : val[i], isNewChar = (i === val.length - 1 && val.length > lastInputVal.length); displayDiv.innerHTML += `<span class="type-char ${isNewChar ? 'fade-in' : ''}">${char}</span>`; }
            displayDiv.innerHTML += `<span class="blinking-cursor"></span>`; lastInputVal = val;
        });

        hiddenInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                const rawText = this.value; this.value = ''; lastInputVal = '';
                displayDiv.innerHTML = '<span class="blinking-cursor"></span>'; placeholder.style.opacity = '1';
                push(messagesRef, { text: rawText, name: activeUserName, avatar: activeAvatarSVG, timestamp: Date.now() });
            }
        });

        // --- THE GATEKEEPER: ADMIN PANEL ---
        const adminTrigger = document.getElementById('admin-trigger');
        const adminOverlay = document.getElementById('admin-overlay');
        const gateKeyInput = document.getElementById('gate-key-input');
        const gateEntry = document.getElementById('gate-entry');
        const adminControls = document.getElementById('admin-controls');
        
        // Buttons
        const btnPurgeMsg = document.getElementById('btn-purge-msg');
        const btnPurgeUsers = document.getElementById('btn-purge-users');
        const btnCloseAdmin = document.getElementById('btn-close-admin');

        // Open Gate Overlay
        adminTrigger.addEventListener('click', (e) => {
            e.preventDefault();
            adminOverlay.style.display = 'flex';
            hiddenInput.disabled = true; // Lock chat input
            setTimeout(() => { 
                adminOverlay.style.opacity = '1'; 
                gateKeyInput.focus();
            }, 50);
        });

        // Secret Password Check
        gateKeyInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (gateKeyInput.value.toLowerCase() === 'close') {
                    // Password Accepted: Show Controls
                    gateEntry.style.display = 'none';
                    adminControls.style.display = 'flex';
                } else {
                    // Password Failed
                    gateKeyInput.value = '';
                    gateKeyInput.style.borderColor = '#ff3333';
                    setTimeout(() => { gateKeyInput.style.borderColor = 'rgba(255,255,255,0.1)'; }, 500);
                }
            }
        });

        // Purge Functions
        btnPurgeMsg.addEventListener('click', () => {
            remove(messagesRef).then(() => {
                btnPurgeMsg.innerText = "[ TRANSMISSIONS DESTROYED ]";
                setTimeout(() => { btnPurgeMsg.innerText = "[ PURGE ALL TRANSMISSIONS ]"; }, 2000);
            });
        });

        btnPurgeUsers.addEventListener('click', () => {
            remove(ref(db, 'users')).then(() => {
                btnPurgeUsers.innerText = "[ IDENTITIES VAPORIZED ]";
                setTimeout(() => { btnPurgeUsers.innerText = "[ PURGE ALL IDENTITIES ]"; }, 2000);
            });
        });

        // Close Admin Panel
        btnCloseAdmin.addEventListener('click', () => {
            adminOverlay.style.opacity = '0';
            setTimeout(() => { 
                adminOverlay.style.display = 'none'; 
                gateEntry.style.display = 'block'; // Reset for next time
                adminControls.style.display = 'none';
                gateKeyInput.value = '';
                hiddenInput.disabled = false;
                hiddenInput.focus();
            }, 500);
        });

        // --- AUDIO ENGINE ---
        let audioCtx; let isDronePlaying = false;
        function initAudioSystemWake() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); const dropOsc = audioCtx.createOscillator(), dropGain = audioCtx.createGain(); dropOsc.type = 'sine'; dropOsc.frequency.setValueAtTime(200, audioCtx.currentTime); dropOsc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 2); dropGain.gain.setValueAtTime(1, audioCtx.currentTime); dropGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 3); dropOsc.connect(dropGain); dropGain.connect(audioCtx.destination); dropOsc.start(); dropOsc.stop(audioCtx.currentTime + 3); startBreathingDrone(); }
        function startBreathingDrone() { if (!isDronePlaying && audioCtx) { const droneGain = audioCtx.createGain(); droneGain.gain.value = 0.02; const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 150; const osc1 = audioCtx.createOscillator(); osc1.type = 'sine'; osc1.frequency.value = 43.65; const osc2 = audioCtx.createOscillator(); osc2.type = 'triangle'; osc2.frequency.value = 44.10; const lfo = audioCtx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.04; const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 0.015; lfo.connect(lfoGain); lfoGain.connect(droneGain.gain); osc1.connect(filter); osc2.connect(filter); filter.connect(droneGain); droneGain.connect(audioCtx.destination); osc1.start(); osc2.start(); lfo.start(); isDronePlaying = true; } }
        function playEtherealChime() { if (!audioCtx) return; const osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain(), filter = audioCtx.createBiquadFilter(); osc.type = 'sine'; osc.frequency.setValueAtTime(70 + Math.random() * 40, audioCtx.currentTime); filter.type = 'lowpass'; filter.frequency.setValueAtTime(300, audioCtx.currentTime); gainNode.gain.setValueAtTime(0, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 1.2); gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 8.0); osc.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 8.0); }

        // --- BACKGROUND EFFECTS ---
        const grainCanvas = document.getElementById('lo-fi-grain'); const gCtx = grainCanvas.getContext('2d', { alpha: false }); let grainCache = null;
        function initGrain() { grainCanvas.width = window.innerWidth; grainCanvas.height = window.innerHeight; const idata = gCtx.createImageData(grainCanvas.width, grainCanvas.height); const buffer32 = new Uint32Array(idata.data.buffer); for (let i = 0; i < buffer32.length; i++) buffer32[i] = Math.random() < 0.5 ? 0xff000000 : 0xffffffff; grainCache = document.createElement('canvas'); grainCache.width = grainCanvas.width; grainCache.height = grainCanvas.height; grainCache.getContext('2d').putImageData(idata, 0, 0); }
        function drawGrain() { if (!grainCache) return; gCtx.clearRect(0, 0, grainCanvas.width, grainCanvas.height); gCtx.drawImage(grainCache, Math.floor((Math.random() * 30) - 15), Math.floor((Math.random() * 30) - 15)); }
        window.addEventListener('resize', initGrain); initGrain(); setInterval(drawGrain, 50);

        const dustCanvas = document.getElementById('void-dust'); const dCtx = dustCanvas.getContext('2d'); let dustParticles = [];
        function initDust() { dustCanvas.width = window.innerWidth; dustCanvas.height = window.innerHeight; dustParticles = []; for(let i = 0; i < 200; i++) { dustParticles.push({ x: Math.random() * dustCanvas.width, y: Math.random() * dustCanvas.height, radius: Math.random() * 2.2, vx: (Math.random() - 0.5) * 0.15, vy: Math.random() * -0.4 - 0.1, alpha: Math.random() * 0.35 }); } }
        window.addEventListener('resize', initDust); initDust();
        function drawDust(cursorX, cursorY) { dCtx.clearRect(0, 0, dustCanvas.width, dustCanvas.height); dCtx.fillStyle = '#ffffff'; dustParticles.forEach(p => { const dx = p.x - cursorX, dy = p.y - cursorY, dist = Math.hypot(dx, dy); if (dist < 250) { const force = (250 - dist) / 250; p.vx += (dx / dist) * force * 0.04; p.vy += (dy / dist) * force * 0.04; } p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98; if (p.y < 0) p.y = dustCanvas.height; if (p.x < 0) p.x = dustCanvas.width; if (p.x > dustCanvas.width) p.x = 0; dCtx.globalAlpha = p.alpha; dCtx.beginPath(); dCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); dCtx.fill(); }); }

        // --- BRUTALIST CURSOR ---
        const cursorCore = document.getElementById('cursor-core'); const cursorTrail = document.getElementById('cursor-trail');
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2; let trailX = mouseX, trailY = mouseY, rotationAngle = 0;
        document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; cursorCore.style.left = `${mouseX}px`; cursorCore.style.top = `${mouseY}px`; });
        function animateCursor() {
            const dx = mouseX - trailX, dy = mouseY - trailY, velocity = Math.hypot(dx, dy);
            trailX += dx * 0.15; trailY += dy * 0.15; rotationAngle += velocity * 0.1;
            cursorTrail.style.left = `${trailX}px`; cursorTrail.style.top = `${trailY}px`; cursorTrail.style.transform = `translate(-50%, -50%) rotate(${rotationAngle}deg)`;
            drawDust(trailX, trailY);
            const charNodes = document.querySelectorAll('.tx-char'); const timeOffset = Date.now() * 0.003;
            charNodes.forEach((node, index) => {
                const rect = node.getBoundingClientRect(), dist = Math.hypot(trailX - (rect.left + rect.width / 2), trailY - (rect.top + rect.height / 2));
                if (dist < 120) {
                    const inf = 1 - (dist / 120), fX = Math.sin(timeOffset + index) * (inf * 8), fY = Math.cos(timeOffset * 1.2 + index) * (inf * 8);
                    node.style.transition = 'none'; node.style.transform = `translate(${fX}px, ${fY}px) rotate(${Math.sin(timeOffset + index)*(inf*15)}deg)`; node.style.color = `rgba(255, 255, 255, ${0.8 + inf * 0.2})`; node.style.textShadow = `0 0 ${inf * 15}px rgba(255, 255, 255, ${inf * 0.6})`;
                } else if (node.style.transform !== '') { node.style.transition = 'transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), color 0.6s, text-shadow 0.6s'; node.style.transform = ''; node.style.color = 'var(--ash)'; node.style.textShadow = 'none'; }
            }); requestAnimationFrame(animateCursor);
        } animateCursor();

        // --- WAVEFORM ---
        const waveCanvas = document.getElementById('ethereal-wave'); const wCtx = waveCanvas.getContext('2d'); let wWidth, wHeight, time = 0, typingIntensity = 0;
        function resizeWave() { wWidth = waveCanvas.width = window.innerWidth; wHeight = waveCanvas.height = window.innerHeight * 0.35; }
        window.addEventListener('resize', resizeWave); resizeWave();
        function drawWaveform() {
            wCtx.clearRect(0, 0, wWidth, wHeight); typingIntensity *= 0.96; 
            wCtx.beginPath(); wCtx.lineWidth = 1.5; wCtx.strokeStyle = `rgba(255, 255, 255, ${0.05 + (typingIntensity * 0.15)})`; wCtx.shadowBlur = 10 + (typingIntensity * 20); wCtx.shadowColor = 'rgba(255, 255, 255, 0.4)';
            const yCenter = wHeight / 2, amp = 15 + (typingIntensity * 60); 
            for (let x = 0; x < wWidth; x++) { let y = yCenter + Math.sin(x * 0.003 + time) * amp + Math.cos(x * 0.009 - time * 0.8) * (amp * 0.6); if (x === 0) wCtx.moveTo(x, y); else wCtx.lineTo(x, y); }
            wCtx.stroke(); wCtx.shadowBlur = 0; time += 0.012 + (typingIntensity * 0.03); requestAnimationFrame(drawWaveform);
        } drawWaveform();

    </script>
</body>
</html>
