<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNT // ETHEREAL RELAY [ZERO-G]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Space+Mono:wght@400&display=swap');

        :root {
            --void: #020202;
            --ash: #ececec;
            --pure-light: #ffffff;
            --ghost: rgba(255, 255, 255, 0.04);
            --mono-font: 'Space Mono', monospace;
            --serif-font: 'Cormorant Garamond', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }

        body {
            background-color: var(--void); color: var(--ash);
            font-family: var(--mono-font); overflow: hidden;
            height: 100vh; width: 100vw;
        }

        /* --- VOID DUST & FILM GRAIN --- */
        #lo-fi-grain {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999;
            opacity: 0.035; mix-blend-mode: overlay;
        }

        #void-dust {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none; opacity: 0.85; /* Increased visibility */
        }

        /* --- BESPOKE BRUTALIST CURSOR --- */
        #cursor-core {
            position: fixed; top: 0; left: 0;
            color: var(--pure-light); font-family: var(--mono-font);
            font-size: 14px; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10000;
            text-shadow: 0 0 8px var(--pure-light);
        }

        #cursor-trail {
            position: fixed; top: 0; left: 0;
            width: 35px; height: 35px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transform: translate(-50%, -50%); pointer-events: none; z-index: 9998;
            transition: width 0.3s, height 0.3s;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        /* The geometric bracket aesthetic */
        #cursor-trail::before, #cursor-trail::after {
            content: ''; height: 40%; width: 2px; background: var(--pure-light);
            box-shadow: 0 0 10px var(--pure-light);
        }

        /* --- LUMINESCENT WAVEFORM --- */
        #ethereal-wave {
            position: fixed; bottom: 0; left: 0;
            width: 100vw; height: 35vh; z-index: 1;
            pointer-events: none; opacity: 0.5;
        }

        /* --- ARCHITECTURAL GRID --- */
        .brutalist-grid {
            display: grid; grid-template-columns: 80px 1fr;
            height: 100vh; width: 100vw; position: relative; z-index: 10;
        }

        .left-axis { 
            border-right: 1px solid var(--ghost); display: flex; flex-direction: column; 
            justify-content: space-between; padding: 40px 0; align-items: center; 
        }

        .sigil { font-family: var(--serif-font); font-style: italic; font-size: 1.8rem; color: rgba(255,255,255,0.3); text-decoration: none; transition: all 1s ease; }
        .sigil:hover ~ #cursor-trail { width: 55px; height: 55px; border-radius: 50%; border-color: transparent; }
        .vertical-marker { transform: rotate(-90deg); white-space: nowrap; font-size: 0.55rem; color: rgba(255, 255, 255, 0.15); letter-spacing: 8px; text-transform: uppercase;}

        /* --- THE VOID (CHAT AREA) --- */
        .void-nave {
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 15vh 15vw; position: relative;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 100%);
        }

        .message-stream {
            display: flex; flex-direction: column; gap: 60px;
            padding-bottom: 80px; width: 100%;
        }

        /* --- ZERO-GRAVITY PHYSICS --- */
        .tx-wrapper {
            opacity: 0; filter: blur(15px);
            transform: translateY(60px) scale(0.95);
            /* Lengthened floaty entrance */
            animation: emerge 4.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: opacity 8s ease, filter 8s ease;
        }

        .tx-physics-body {
            display: flex; flex-direction: column; gap: 8px; transform-origin: center left;
        }

        .tx-wrapper.decay { opacity: 0.05; filter: blur(8px); }

        @keyframes emerge { to { opacity: 1; filter: blur(0px); transform: translateY(0) scale(1); } }
        
        /* Expanded drift radius for spacey feel */
        @keyframes liquid-drift {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(1.2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .tx-meta { font-size: 0.55rem; color: rgba(255, 255, 255, 0.15); letter-spacing: 4px; }

        .tx-content-container {
            font-family: var(--serif-font); font-style: italic; font-size: 2.6rem; 
            font-weight: 300; line-height: 1.1; color: var(--ash); max-width: 850px;
        }

        /* Standard character node */
        .tx-char {
            display: inline-block; will-change: transform, color, text-shadow;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), color 0.6s, text-shadow 0.6s;
        }

        /* --- 35% ANOMALY EFFECT (OPTIC DISPLACEMENT) --- */
        .tx-wrapper.anomaly {
            animation: anomaly-emerge 3.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes anomaly-emerge {
            0% { filter: blur(20px); letter-spacing: 15px; opacity: 0; transform: scale(1.05) translateY(30px); color: var(--pure-light); text-shadow: 0 0 20px var(--pure-light);}
            30% { filter: blur(2px); letter-spacing: 5px; opacity: 1; transform: scale(1.02) translateY(5px); color: var(--pure-light);}
            100% { filter: blur(0px); letter-spacing: 0.5px; opacity: 1; transform: scale(1) translateY(0); color: var(--ash); text-shadow: none;}
        }

        /* --- GENERATIVE INPUT MEMBRANE --- */
        .input-membrane {
            position: absolute; bottom: 60px; left: 15vw; right: 15vw;
            display: flex; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;
            transition: border-color 0.8s ease; cursor: none;
        }

        .input-membrane:focus-within { border-color: rgba(255,255,255,0.3); }

        /* The real input is hidden, used only to capture keystrokes */
        #hidden-void-input {
            position: absolute; opacity: 0; pointer-events: none;
        }

        /* The visible, generative text display */
        #custom-input-display {
            font-family: var(--serif-font); font-style: italic; font-size: 1.6rem;
            color: var(--pure-light); letter-spacing: 1px; display: flex; flex-wrap: wrap;
        }

        .input-placeholder { color: rgba(255,255,255,0.08); font-family: var(--serif-font); font-style: italic; font-size: 1.6rem; position: absolute; pointer-events: none; transition: opacity 0.3s; }

        /* Effect applied to newly typed characters */
        .type-char { display: inline-block; }
        .type-char.fade-in {
            animation: structural-snap 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes structural-snap {
            0% { opacity: 0; filter: blur(4px); transform: translateY(5px) scale(0.9); }
            100% { opacity: 1; filter: blur(0px); transform: translateY(0) scale(1); }
        }

        /* Blinking terminal cursor */
        .blinking-cursor {
            display: inline-block; width: 8px; height: 2px;
            background-color: var(--pure-light); margin-left: 4px; margin-top: auto; margin-bottom: 4px;
            animation: blink 1s infinite steps(2); box-shadow: 0 0 5px var(--pure-light);
        }

        @keyframes blink { 0% { opacity: 1; } 100% { opacity: 0; } }

    </style>
</head>
<body>

    <canvas id="lo-fi-grain"></canvas>
    <canvas id="void-dust"></canvas>

    <div id="cursor-core">+</div>
    <div id="cursor-trail"></div>
    <canvas id="ethereal-wave"></canvas>

    <div class="brutalist-grid">
        <div class="left-axis">
            <a href="index.html" class="sigil">†</a>
            <div class="vertical-marker">RELAY // ZERO-G</div>
            <div class="vertical-marker" style="color: rgba(255,255,255,0.08);">0X1900</div>
        </div>

        <div class="void-nave">
            <div class="message-stream" id="stream"></div>
            
            <div class="input-membrane" id="membrane-container">
                <div class="input-placeholder" id="placeholder-text">Type...</div>
                <div id="custom-input-display"><span class="blinking-cursor"></span></div>
                <input type="text" id="hidden-void-input" autocomplete="off" autofocus>
            </div>
        </div>
    </div>

    <script>
        // --- 1. FILM GRAIN ---
        const grainCanvas = document.getElementById('lo-fi-grain');
        const gCtx = grainCanvas.getContext('2d', { alpha: false });
        let grainCache = null;
        
        function initGrain() {
            grainCanvas.width = window.innerWidth; grainCanvas.height = window.innerHeight;
            const idata = gCtx.createImageData(grainCanvas.width, grainCanvas.height);
            const buffer32 = new Uint32Array(idata.data.buffer);
            for (let i = 0; i < buffer32.length; i++) buffer32[i] = Math.random() < 0.5 ? 0xff000000 : 0xffffffff; 
            grainCache = document.createElement('canvas'); grainCache.width = grainCanvas.width; grainCache.height = grainCanvas.height;
            grainCache.getContext('2d').putImageData(idata, 0, 0);
        }

        function drawGrain() {
            if (!grainCache) return;
            gCtx.clearRect(0, 0, grainCanvas.width, grainCanvas.height);
            gCtx.drawImage(grainCache, Math.floor((Math.random() * 30) - 15), Math.floor((Math.random() * 30) - 15));
        }
        window.addEventListener('resize', initGrain); initGrain(); setInterval(drawGrain, 50);

        // --- 2. ENHANCED VOID DUST ---
        const dustCanvas = document.getElementById('void-dust');
        const dCtx = dustCanvas.getContext('2d');
        let dustParticles = [];

        function initDust() {
            dustCanvas.width = window.innerWidth; dustCanvas.height = window.innerHeight;
            dustParticles = [];
            // Increased particle count and radius
            for(let i = 0; i < 200; i++) {
                dustParticles.push({
                    x: Math.random() * dustCanvas.width, y: Math.random() * dustCanvas.height,
                    radius: Math.random() * 2.2, // Larger
                    vx: (Math.random() - 0.5) * 0.15, vy: Math.random() * -0.4 - 0.1,
                    alpha: Math.random() * 0.35 // Brighter
                });
            }
        }
        window.addEventListener('resize', initDust); initDust();

        function drawDust(cursorX, cursorY) {
            dCtx.clearRect(0, 0, dustCanvas.width, dustCanvas.height);
            dCtx.fillStyle = '#ffffff';
            
            dustParticles.forEach(p => {
                const dx = p.x - cursorX, dy = p.y - cursorY, dist = Math.hypot(dx, dy);
                if (dist < 250) {
                    const force = (250 - dist) / 250;
                    p.vx += (dx / dist) * force * 0.04; p.vy += (dy / dist) * force * 0.04;
                }
                p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98;
                if (p.y < 0) p.y = dustCanvas.height; if (p.x < 0) p.x = dustCanvas.width; if (p.x > dustCanvas.width) p.x = 0;

                dCtx.globalAlpha = p.alpha; dCtx.beginPath(); dCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); dCtx.fill();
            });
        }

        // --- 3. BRUTALIST CURSOR PHYSICS ---
        const cursorCore = document.getElementById('cursor-core');
        const cursorTrail = document.getElementById('cursor-trail');
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let trailX = mouseX, trailY = mouseY;
        let rotationAngle = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            cursorCore.style.left = `${mouseX}px`; cursorCore.style.top = `${mouseY}px`;
        });

        function animateCursor() {
            // Calculate velocity for dynamic rotation
            const dx = mouseX - trailX; const dy = mouseY - trailY;
            const velocity = Math.hypot(dx, dy);
            
            trailX += dx * 0.15; trailY += dy * 0.15;
            
            // Spin the geometric brackets based on speed
            rotationAngle += velocity * 0.1;
            
            cursorTrail.style.left = `${trailX}px`; cursorTrail.style.top = `${trailY}px`;
            cursorTrail.style.transform = `translate(-50%, -50%) rotate(${rotationAngle}deg)`;

            drawDust(trailX, trailY);

            // Magnetic Flutter for text nodes
            const charNodes = document.querySelectorAll('.tx-char');
            const timeOffset = Date.now() * 0.003;
            
            charNodes.forEach((node, index) => {
                const rect = node.getBoundingClientRect();
                const dist = Math.hypot(trailX - (rect.left + rect.width / 2), trailY - (rect.top + rect.height / 2));
                
                if (dist < 120) {
                    const inf = 1 - (dist / 120);
                    const fX = Math.sin(timeOffset + index) * (inf * 8);
                    const fY = Math.cos(timeOffset * 1.2 + index) * (inf * 8);
                    node.style.transition = 'none'; 
                    node.style.transform = `translate(${fX}px, ${fY}px) rotate(${Math.sin(timeOffset + index)*(inf*15)}deg)`;
                    node.style.color = `rgba(255, 255, 255, ${0.8 + inf * 0.2})`;
                    node.style.textShadow = `0 0 ${inf * 15}px rgba(255, 255, 255, ${inf * 0.6})`;
                } else if (node.style.transform !== '') {
                    node.style.transition = 'transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), color 0.6s, text-shadow 0.6s';
                    node.style.transform = ''; node.style.color = 'var(--ash)'; node.style.textShadow = 'none';
                }
            });
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // --- 4. THE "BREATHING" DRONE (LFO) ---
        let audioCtx;
        let isDronePlaying = false;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if (!isDronePlaying && audioCtx) {
                // Main drone gain
                const droneGain = audioCtx.createGain();
                droneGain.gain.value = 0.02; // Very quiet base
                
                // Lowpass filter to keep it deep
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.value = 150; 
                
                // The oscillators (Sub frequencies)
                const osc1 = audioCtx.createOscillator(); osc1.type = 'sine'; osc1.frequency.value = 43.65;
                const osc2 = audioCtx.createOscillator(); osc2.type = 'triangle'; osc2.frequency.value = 44.10; // Detuned to phase
                
                // The LFO (Low Frequency Oscillator) to make it breathe
                const lfo = audioCtx.createOscillator();
                lfo.type = 'sine';
                lfo.frequency.value = 0.04; // Very slow cycle (~25 seconds)
                const lfoGain = audioCtx.createGain();
                lfoGain.gain.value = 0.015; // Amount of volume swelling
                
                // Connect LFO to modulate the main drone gain
                lfo.connect(lfoGain);
                lfoGain.connect(droneGain.gain);

                osc1.connect(filter); osc2.connect(filter);
                filter.connect(droneGain); droneGain.connect(audioCtx.destination);
                
                osc1.start(); osc2.start(); lfo.start();
                isDronePlaying = true;
            }
        }

        function playEtherealChime() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain(), filter = audioCtx.createBiquadFilter();
            osc.type = 'sine'; osc.frequency.setValueAtTime(70 + Math.random() * 40, audioCtx.currentTime);
            filter.type = 'lowpass'; filter.frequency.setValueAtTime(300, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 1.2); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 8.0); // 8s decay
            osc.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 8.0);
        }

        // --- 5. GENERATIVE WAVEFORM ---
        const waveCanvas = document.getElementById('ethereal-wave');
        const wCtx = waveCanvas.getContext('2d');
        let wWidth, wHeight, time = 0, typingIntensity = 0;

        function resizeWave() { wWidth = waveCanvas.width = window.innerWidth; wHeight = waveCanvas.height = window.innerHeight * 0.35; }
        window.addEventListener('resize', resizeWave); resizeWave();

        function drawWaveform() {
            wCtx.clearRect(0, 0, wWidth, wHeight); typingIntensity *= 0.96; 
            wCtx.beginPath(); wCtx.lineWidth = 1.5;
            wCtx.strokeStyle = `rgba(255, 255, 255, ${0.05 + (typingIntensity * 0.15)})`;
            wCtx.shadowBlur = 10 + (typingIntensity * 20); wCtx.shadowColor = 'rgba(255, 255, 255, 0.4)';
            const yCenter = wHeight / 2; const amp = 15 + (typingIntensity * 60); 

            for (let x = 0; x < wWidth; x++) {
                let y = yCenter + Math.sin(x * 0.003 + time) * amp + Math.cos(x * 0.009 - time * 0.8) * (amp * 0.6);
                if (x === 0) wCtx.moveTo(x, y); else wCtx.lineTo(x, y);
            }
            wCtx.stroke(); wCtx.shadowBlur = 0; time += 0.012 + (typingIntensity * 0.03);
            requestAnimationFrame(drawWaveform);
        }
        drawWaveform();

        // --- 6. GENERATIVE TYPING & TRANSMISSION ---
        const hiddenInput = document.getElementById('hidden-void-input');
        const displayDiv = document.getElementById('custom-input-display');
        const placeholder = document.getElementById('placeholder-text');
        const membrane = document.getElementById('membrane-container');
        const stream = document.getElementById('stream');
        
        let lastInputVal = "";

        // Keep hidden input focused
        membrane.addEventListener('click', () => { hiddenInput.focus(); initAudio(); });
        document.body.addEventListener('click', initAudio, { once: true });

        hiddenInput.addEventListener('input', (e) => {
            const val = e.target.value;
            typingIntensity = Math.min(typingIntensity + 0.15, 1);
            
            // Hide/Show placeholder
            placeholder.style.opacity = val.length > 0 ? '0' : '1';

            // Rebuild visual string
            displayDiv.innerHTML = '';
            for(let i=0; i<val.length; i++) {
                const char = val[i] === ' ' ? '&nbsp;' : val[i];
                // Only trigger the fade-in animation on the newly typed character
                const isNewChar = (i === val.length - 1 && val.length > lastInputVal.length);
                displayDiv.innerHTML += `<span class="type-char ${isNewChar ? 'fade-in' : ''}">${char}</span>`;
            }
            // Re-append blinking cursor
            displayDiv.innerHTML += `<span class="blinking-cursor"></span>`;
            
            lastInputVal = val;
        });

        hiddenInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                initAudio();
                const rawText = this.value;
                this.value = '';
                lastInputVal = '';
                displayDiv.innerHTML = '<span class="blinking-cursor"></span>';
                placeholder.style.opacity = '1';
                
                const now = new Date();
                const timeStr = `[ ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')} ]`;

                const splitText = rawText.split('').map(char => {
                    return char === ' ' ? '&nbsp;' : `<span class="tx-char">${char}</span>`;
                }).join('');

                const driftDuration = 12 + Math.random() * 8; 
                const driftDelay = Math.random() * -15; 

                // 35% Chance for Anomaly Effect
                const isAnomaly = Math.random() < 0.35;
                const baseClass = isAnomaly ? 'tx-wrapper anomaly' : 'tx-wrapper';

                const msgBlock = document.createElement('div');
                msgBlock.className = baseClass;
                
                msgBlock.innerHTML = `
                    <div class="tx-physics-body" style="animation: liquid-drift ${driftDuration}s ease-in-out ${driftDelay}s infinite alternate;">
                        <div class="tx-meta">${timeStr}</div>
                        <div class="tx-content-container">${splitText}</div>
                    </div>
                `;
                
                stream.appendChild(msgBlock);
                playEtherealChime();
                typingIntensity = 3.5;

                const allMessages = document.querySelectorAll('.tx-wrapper');
                if (allMessages.length > 5) allMessages[allMessages.length - 6].classList.add('decay');

                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        });
    </script>
</body>
</html>
